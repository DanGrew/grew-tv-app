<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>grew-tv remote</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #111; overflow: hidden; }
body { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 20px; }
.row { display: flex; gap: 12px; align-items: center; justify-content: center; }
button {
  width: 90px; height: 90px; border-radius: 14px; border: none; cursor: pointer;
  background: #2a2a2a; color: #fff; font-size: 28px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s, transform 0.08s;
  touch-action: manipulation;
}
button:active { background: #f0c040; color: #111; transform: scale(0.93); }
button.wide { width: 120px; }
#status { color: #555; font-size: 13px; font-family: monospace; margin-top: 8px; height: 16px; }
</style>
</head>
<body>

<div class="row">
  <button data-cmd="prev" title="Previous">⏮</button>
</div>
<div class="row">
  <button data-cmd="vol_down" title="Volume down">🔉</button>
  <button data-cmd="play" class="wide" id="playpause" title="Play / Pause">⏯</button>
  <button data-cmd="vol_up" title="Volume up">🔊</button>
</div>
<div class="row">
  <button data-cmd="next" title="Next">⏭</button>
</div>

<div id="status"></div>

<script>
(function () {
  var BASE = window.location.origin;
  var status = document.getElementById('status');
  var timer;

  function flash(msg) {
    status.textContent = msg;
    clearTimeout(timer);
    timer = setTimeout(function () { status.textContent = ''; }, 1500);
  }

  function send(cmd) {
    fetch(BASE + '/command', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cmd: cmd })
    }).then(function (r) {
      if (!r.ok) flash('error ' + r.status);
    }).catch(function () {
      flash('no connection');
    });
  }

  document.querySelectorAll('button[data-cmd]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      send(btn.getAttribute('data-cmd'));
    });
  });
}());
</script>
</body>
</html>
