<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>grew-tv remote</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #111; overflow: hidden; }
body { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 16px; }
.row { display: flex; gap: 10px; align-items: center; justify-content: center; }
.spacer { width: 90px; height: 90px; }
button {
  width: 90px; height: 90px; border-radius: 14px; border: none; cursor: pointer;
  background: #2a2a2a; color: #fff; font-size: 28px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s, transform 0.08s;
  touch-action: manipulation;
}
button:active { background: #f0c040; color: #111; transform: scale(0.93); }
button.ok { background: #3a3a3a; font-size: 16px; font-weight: bold; }
button.back { background: #1e1e1e; font-size: 14px; color: #aaa; }
button.wide { width: 120px; }
button.sm { font-size: 18px; font-weight: bold; }
hr { width: 100%; border: none; border-top: 1px solid #222; margin: 2px 0; }
#status { color: #555; font-size: 13px; font-family: monospace; margin-top: 4px; height: 16px; }
</style>
</head>
<body>

<div class="row">
  <div class="spacer"></div>
  <button data-cmd="up">▲</button>
  <button data-cmd="back" class="back">Back</button>
</div>
<div class="row">
  <button data-cmd="left">◄</button>
  <button data-cmd="select" class="ok">OK</button>
  <button data-cmd="right">►</button>
</div>
<div class="row">
  <div class="spacer"></div>
  <button data-cmd="down">▼</button>
  <div class="spacer"></div>
</div>

<hr>

<div class="row">
  <button data-cmd="vol_down" class="sm">Vol −</button>
  <button data-cmd="play" class="wide">⏯</button>
  <button data-cmd="vol_up" class="sm">Vol +</button>
</div>
<div class="row">
  <button data-cmd="prev">⏮</button>
  <div class="spacer"></div>
  <button data-cmd="next">⏭</button>
</div>

<div id="status"></div>

<script>
(function () {
  var BASE = window.location.origin;
  var status = document.getElementById('status');
  var timer;

  function flash(msg) {
    status.textContent = msg;
    clearTimeout(timer);
    timer = setTimeout(function () { status.textContent = ''; }, 1500);
  }

  function send(cmd) {
    fetch(BASE + '/command', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cmd: cmd, command_id: crypto.randomUUID() })
    }).then(function (r) {
      if (!r.ok) flash('error ' + r.status);
    }).catch(function () {
      flash('no connection');
    });
  }

  document.querySelectorAll('button[data-cmd]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      send(btn.getAttribute('data-cmd'));
    });
  });
}());
</script>
</body>
</html>
