<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>grew-tv — Atlas door (proto)</title>
<style>
  html, body { margin: 0; height: 100%; background: #0b0d12; color: #eef1f7;
    font: 22px/1.4 -apple-system, system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center; }
  h1 { font-size: 26px; letter-spacing: .06em; opacity: .55; font-weight: 600; margin: 0 0 6px; }
  p  { opacity: .5; margin: 0 0 34px; font-size: 18px; }
  .tile {
    width: 320px; height: 200px; border-radius: 22px; border: 0;
    background: linear-gradient(160deg, #1c3a6e, #14224a);
    color: #eef1f7; font: 600 24px/1.3 inherit; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  }
  .tile .ico { font-size: 54px; }
  .tile:focus { outline: 4px solid #7ea2ff; outline-offset: 4px; }
  #status { margin-top: 30px; font-size: 15px; opacity: .45; }
  #error { color: #ff8a8a; min-height: 1px; }
</style>
</head>
<body>
  <h1>GREW-TV</h1>
  <p>home · (prototype external-destination door)</p>
  <button class="tile" id="atlas-tile" autofocus>
    <span class="ico">🗺️</span>
    <span>Atlas</span>
  </button>
  <div id="status">connecting…</div>
  <div id="error"></div>

<script type="module">
  import { connectApp } from '../core/app-ws.js';

  var GREW = window.location.origin;
  var ATLAS = 'http://localhost:8099';
  // The destination the companion carries in its intent (config-driven in the real
  // feature). Return URL brings the TV back to this grew-tv door.
  var ATLAS_TV = ATLAS + '/proto/tv.html?home=' + encodeURIComponent(GREW + '/proto/atlas-door.html');

  var status = document.getElementById('status');
  var tile = document.getElementById('atlas-tile');

  function cross(tvUrl) { window.location.href = tvUrl || ATLAS_TV; }

  // The whole point of the handover: a launchExternal intent (from the companion)
  // walks the TV to the atlas. Selecting the tile on the TV crosses it directly too.
  var app = connectApp(GREW, function (intent, params) {
    if (intent === 'launchExternal') cross(params && params.tvUrl);
  });
  app.sendContext({ context_id: 'atlas-door' });

  tile.addEventListener('click', function () { cross(ATLAS_TV); });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') cross(ATLAS_TV);
  });

  status.textContent = 'registered as a TV — waiting for the phone (or press Select)';
</script>
</body>
</html>
