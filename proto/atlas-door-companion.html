<!doctype html>
<!--
  ⚠️ PROTOTYPE — throwaway grew-tv→atlas handover spike (2026-07-12).
  Phone-side door: sends `launchExternal` (crossing the TV) and walks itself to the
  atlas remote — one tap, both surfaces. ZERO backend change.
  REMOVE this whole proto/ dir after FEAT-049 lands.
  Design capture: claude-workflow/homeschooling/workflow/specs/raw/atlas-on-tv-integration.md
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>grew-tv companion — Atlas door (proto)</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body { background: #10131a; color: #eef1f7;
    font: 17px/1.4 -apple-system, system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  h1 { font-size: 16px; letter-spacing: .06em; opacity: .5; margin: 0 0 4px; }
  p  { opacity: .5; margin: 0 0 30px; font-size: 14px; text-align: center; }
  button.tile { width: 100%; max-width: 320px; padding: 26px; border: 0; border-radius: 20px;
    background: linear-gradient(160deg, #1c3a6e, #14224a); color: #eef1f7;
    font: 600 20px/1.3 inherit; display: flex; align-items: center; justify-content: center; gap: 12px; }
  button.tile:active { filter: brightness(1.2); }
  .ico { font-size: 30px; }
  #status { margin-top: 22px; font-size: 13px; opacity: .45; text-align: center; }
  #error { color: #ff8a8a; min-height: 1px; }
</style>
</head>
<body>
  <h1>GREW-TV · COMPANION</h1>
  <p>tap to send the TV and this phone into the Atlas together</p>
  <button class="tile" id="atlas-tile"><span class="ico">🗺️</span> Enter Atlas</button>
  <div id="status">connecting…</div>
  <div id="error"></div>

<script type="module">
  import { connect } from '../core/companion-ws.js';

  var GREW = window.location.origin;
  var ATLAS = 'http://localhost:8099';
  var ATLAS_TV     = ATLAS + '/proto/tv.html?home='     + encodeURIComponent(GREW + '/proto/atlas-door.html');
  var ATLAS_REMOTE = ATLAS + '/proto/remote.html?home=' + encodeURIComponent(GREW + '/proto/atlas-door-companion.html');

  var status = document.getElementById('status');
  var tile = document.getElementById('atlas-tile');
  function noop() {}

  var api = connect(GREW, noop, function (s) { status.textContent = s; }, noop,
    function (devices) {
      // Force-target the sole TV door so the launchExternal intent routes to it
      // (bypasses any stale persisted target from real grew-tv use).
      if (devices.length) { api.target(devices[0].device_id); status.textContent = 'linked to the TV — ready'; }
    }, {});

  tile.addEventListener('click', function () {
    // One tap crosses BOTH: the TV via the intent, the phone via navigation.
    api.sendIntent('launchExternal', { tvUrl: ATLAS_TV });
    setTimeout(function () { window.location.href = ATLAS_REMOTE; }, 120);
  });
</script>
</body>
</html>
