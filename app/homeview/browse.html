<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grew TV</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0a; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }
button { background: #1a1a1a; color: #fff; border: 3px solid #444; border-radius: 12px; font-size: 40px; padding: 28px 60px; cursor: pointer; min-width: 260px; text-align: center; }
button:focus { outline: none; border-color: #ff0; background: #1a1a00; color: #ff0; }
button:hover { background: #222; }
#grid-container { width: 100vw; height: 100vh; overflow-y: auto; padding: 60px; }
#profile-label { font-size: 24px; color: #666; position: fixed; top: 24px; right: 40px; }
#grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 32px; max-width: 1400px; margin: 0 auto; }
.film-tile { background: #1a1a1a; border: 3px solid #333; border-radius: 12px; cursor: pointer; overflow: hidden; transition: border-color 0.1s; }
.film-tile:focus { outline: none; border-color: #ff0; }
.film-tile:focus .tile-title { color: #ff0; }
.film-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #222; display: block; }
.film-poster-placeholder { width: 100%; aspect-ratio: 2/3; background: #1e1e1e; display: flex; align-items: center; justify-content: center; font-size: 60px; }
.tile-title { font-size: 26px; padding: 16px 20px 20px; line-height: 1.3; }
#btn-settings { font-size: 28px; padding: 16px 40px; min-width: auto; position: fixed; bottom: 40px; right: 40px; }
#screen-settings { display: none; position: fixed; inset: 0; background: #0a0a0a; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
#screen-settings.active { display: flex; }
#settings-table { width: 100%; max-width: 960px; padding: 0 60px; }
.settings-row { display: flex; align-items: center; gap: 32px; padding: 40px 0; }
.settings-label { font-size: 36px; flex: 0 0 200px; }
.settings-status { font-size: 30px; color: #aaa; flex: 1; }
.settings-hr { border: none; border-top: 1px solid #333; margin: 0; }
#error-msg { display: none; }
</style>
</head>
<body>
<div id="screen-settings">
  <div style="display:flex;align-items:center;gap:32px;padding:40px 60px 24px;flex-shrink:0;width:100%;max-width:960px">
    <button id="btn-back-settings" style="font-size:28px;padding:16px 32px;min-width:auto">&#8592; Back</button>
    <h1 style="margin:0;font-size:64px;letter-spacing:-1px">Settings</h1>
  </div>
  <div id="settings-table">
    <hr class="settings-hr">
    <div class="settings-row">
      <div class="settings-label">Devices</div>
      <div class="settings-status" id="settings-device-status">&mdash;</div>
      <button id="btn-refresh">Refresh</button>
    </div>
    <hr class="settings-hr">
  </div>
</div>
<div id="profile-label"></div>
<div id="grid-container"><div id="grid"></div></div>
<button id="btn-settings" tabindex="0">&#9881;</button>
<div id="error-msg"></div>
<script type="module">
import { getProfile, navTo } from '../../core/state.js';
import { initPage, dispatchKey } from '../../core/screen-registry.js';
import { browseArrow, buildGrid } from '../../ui/screens/screen-browse.js';
import { connectApp } from '../../core/app-ws.js';

var MANIFEST_URL = 'http://localhost:8765/manifest.json';

function showSettings() {
  document.getElementById('screen-settings').classList.add('active');
  document.getElementById('btn-back-settings').focus();
  var status = document.getElementById('settings-device-status');
  var btn = document.getElementById('btn-refresh');
  status.textContent = 'Scanning\u2026';
  btn.disabled = true;
  btn.textContent = 'Scanning\u2026';
  fetch('http://localhost:8765/scan', { cache: 'no-store' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var devices = [d.devices].filter(Array.isArray).concat([[]])[0];
      status.textContent = [devices].filter(function(x) { return x.length; }).map(function(x) { return x.join(', '); }).concat(['No devices found'])[0];
    })
    .catch(function() { status.textContent = 'Server unavailable'; })
    .then(function() { btn.disabled = false; btn.textContent = 'Refresh'; });
}

function hideSettings() {
  document.getElementById('screen-settings').classList.remove('active');
  [document.querySelector('.film-tile')].filter(Boolean).forEach(function(t) { t.focus(); });
}

document.getElementById('btn-settings').addEventListener('click', showSettings);
document.getElementById('btn-back-settings').addEventListener('click', hideSettings);
document.getElementById('btn-refresh').addEventListener('click', function() { showSettings(); });
document.addEventListener('keydown', dispatchKey);

initPage({
  onEnter: function() { [document.querySelector('.film-tile')].filter(Boolean).forEach(function(t) { t.focus(); }); },
  keys: { ArrowLeft: browseArrow, ArrowRight: browseArrow, ArrowUp: browseArrow, ArrowDown: browseArrow },
  remote: {}
});

var wsApp = connectApp('ws://localhost:8766', function(intent) {
  var INTENTS = {
    navigate_up:    function() { browseArrow({ key: 'ArrowUp',    preventDefault: function() {} }); },
    navigate_down:  function() { browseArrow({ key: 'ArrowDown',  preventDefault: function() {} }); },
    navigate_left:  function() { browseArrow({ key: 'ArrowLeft',  preventDefault: function() {} }); },
    navigate_right: function() { browseArrow({ key: 'ArrowRight', preventDefault: function() {} }); },
    select:         function() { document.activeElement.click(); },
    back:           function() { navTo('profile.html'); }
  };
  [INTENTS[intent]].filter(Boolean).forEach(function(fn) { fn(); });
});
wsApp.sendContext({ context_id: 'browse' });

fetch(MANIFEST_URL, { cache: 'no-store' })
  .then(function(r) { return r.json(); })
  .then(function(manifest) {
    var profile = [getProfile()].filter(Boolean).concat(['kids'])[0];
    buildGrid(manifest.content, manifest.contentBase, profile, function(film) {
      var TILE_NAV = {
        'true':  function() { navTo('video.html', { film: film.id, item: 0, from: 'browse' }); },
        'false': function() { navTo('detail.html', { film: film.id }); }
      };
      TILE_NAV[film.items.length === 1]();
    });
  })
  .catch(function() { navTo('error.html'); });
</script>
</body>
</html>
