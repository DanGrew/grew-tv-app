<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grew TV</title>
<style>
:root {
  --bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 45%, #0f3460 100%);
  --surface: rgba(255,255,255,0.06);
  --surface-hi: rgba(255,255,255,0.11);
  --border: rgba(255,255,255,0.13);
  --focus: #fff;
  --focus-glow: 0 0 0 1px rgba(255,255,255,0.6), 0 4px 24px rgba(255,255,255,0.15);
  --text: rgba(255,255,255,0.95);
  --text-muted: rgba(255,255,255,0.4);
  --radius: 16px;
  --radius-sm: 8px;
  --dur: 0.18s;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
  --heading-ls: -0.5px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); background-attachment: fixed; background-size: cover; color: var(--text); font-family: var(--font); height: 100vh; overflow: hidden; }
button { background: var(--surface); color: var(--text); border: 2.5px solid var(--border); border-radius: var(--radius); font-size: 40px; padding: 28px 60px; cursor: pointer; min-width: 260px; text-align: center; backdrop-filter: blur(14px) saturate(1.4); -webkit-backdrop-filter: blur(14px) saturate(1.4); transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), color var(--dur) var(--ease); }
button:focus { outline: none; border-color: var(--focus); box-shadow: var(--focus-glow); color: var(--focus); }
button:hover { background: var(--surface-hi); }
#rails-container { width: 100vw; height: 100vh; overflow-y: auto; padding: 60px 0 120px; }
#profile-label { font-size: 24px; color: var(--text-muted); position: fixed; top: 24px; right: 40px; z-index: 5; }
#rails { display: flex; flex-direction: column; gap: 48px; }
.rail-title { font-size: 24px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); padding: 0 60px 18px; }
.rail-row { display: flex; gap: 16px; overflow-x: auto; padding: 10px 60px; scroll-padding-left: 60px; }
.home-empty { font-size: 32px; color: var(--text-muted); text-align: center; padding: 120px 0; }
.film-tile { position: relative; flex: 0 0 300px; width: 300px; background: var(--surface); border: 2.5px solid var(--border); border-radius: var(--radius); cursor: pointer; overflow: hidden; backdrop-filter: blur(14px) saturate(1.4); -webkit-backdrop-filter: blur(14px) saturate(1.4); transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), transform var(--dur) var(--ease); }
.film-tile:focus { outline: none; border-color: var(--focus); box-shadow: var(--focus-glow); transform: scale(1.05); z-index: 1; }
.film-tile:focus .tile-title { color: var(--focus); }
.film-poster { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: var(--surface-hi); display: block; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
.film-poster-placeholder { width: 100%; aspect-ratio: 16/9; background: var(--surface-hi); display: flex; align-items: center; justify-content: center; font-size: 60px; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
.tile-title { font-size: 24px; padding: 14px 18px 18px; line-height: 1.3; transition: color var(--dur) var(--ease); }
.tile-cc { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); color: #fff; font-size: 20px; font-weight: 700; padding: 2px 10px; border-radius: var(--radius-sm); letter-spacing: 1px; }
.tile-progress { position: absolute; left: 0; right: 0; bottom: 0; height: 6px; background: rgba(0,0,0,0.45); }
.tile-progress-fill { height: 100%; background: var(--focus); }
#btn-settings { font-size: 28px; padding: 16px 40px; min-width: auto; position: fixed; bottom: 40px; right: 40px; }
#screen-settings { display: none; position: fixed; inset: 0; background: var(--bg); flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
#screen-settings.active { display: flex; }
#settings-table { width: 100%; max-width: 960px; padding: 0 60px; }
.settings-row { display: flex; align-items: center; gap: 32px; padding: 40px 0; }
.settings-label { font-size: 36px; flex: 0 0 200px; }
.settings-status { font-size: 30px; color: var(--text-muted); flex: 1; }
.settings-hr { border: none; border-top: 1px solid var(--border); margin: 0; }
#error-msg { display: none; }
</style>
</head>
<body id="screen-browse">
<div id="screen-settings">
  <div style="display:flex;align-items:center;gap:32px;padding:40px 60px 24px;flex-shrink:0;width:100%;max-width:960px">
    <button id="btn-back-settings" style="font-size:28px;padding:16px 32px;min-width:auto">&#8592; Back</button>
    <h1 style="margin:0;font-size:64px;letter-spacing:-1px">Settings</h1>
  </div>
  <div id="settings-table">
    <hr class="settings-hr">
    <div class="settings-row">
      <div class="settings-label">Devices</div>
      <div class="settings-status" id="settings-device-status">&mdash;</div>
      <button id="btn-refresh">Refresh</button>
    </div>
    <hr class="settings-hr">
  </div>
</div>
<div id="profile-label"></div>
<div id="rails-container"><div id="rails"></div></div>
<button id="btn-settings" tabindex="0">&#9881;</button>
<div id="error-msg"></div>
<script type="module">
import { initBrowsePage } from '../../ui/screens/screen-browse-page.js';
initBrowsePage();
</script>
</body>
</html>
