<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grew TV</title>
<style>
:root {
  --bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 45%, #0f3460 100%);
  --surface: rgba(255,255,255,0.06);
  --surface-hi: rgba(255,255,255,0.11);
  --border: rgba(255,255,255,0.13);
  --focus: #fff;
  --focus-glow: 0 0 0 1px rgba(255,255,255,0.6), 0 4px 24px rgba(255,255,255,0.15);
  --text: rgba(255,255,255,0.95);
  --text-muted: rgba(255,255,255,0.4);
  --radius: 16px;
  --radius-sm: 8px;
  --dur: 0.18s;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
  --fs-xs: 18px;
  --fs-sm: 22px;
  --fs-md: 26px;
  --fs-lg: 32px;
  --fs-xl: 40px;
  --fs-2xl: 52px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); background-attachment: fixed; background-size: cover; color: var(--text); font-family: var(--font); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
button { background: var(--surface); color: var(--text); border: 2.5px solid var(--border); border-radius: var(--radius); font-size: var(--fs-md); padding: 14px 26px; cursor: pointer; min-width: 100px; text-align: center; backdrop-filter: blur(14px) saturate(1.4); -webkit-backdrop-filter: blur(14px) saturate(1.4); transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), color var(--dur) var(--ease); }
button:focus { outline: none; border-color: var(--focus); box-shadow: var(--focus-glow); color: var(--focus); }
button:hover { background: var(--surface-hi); }
#create-title { font-size: var(--fs-2xl); flex: 1; }
#pl-name { font-size: var(--fs-xl); padding: 22px 28px; margin: 8px 48px 0; border: 2.5px solid var(--border); border-radius: var(--radius); background: var(--surface); min-height: 84px; display: flex; align-items: center; backdrop-filter: blur(14px) saturate(1.4); -webkit-backdrop-filter: blur(14px) saturate(1.4); }
#pl-name.placeholder { color: var(--text-muted); }
#pl-keys { display: grid; grid-template-columns: repeat(9, 1fr); gap: 12px; padding: 28px 48px 48px; align-content: start; overflow-y: auto; }
.pl-key { font-size: var(--fs-md); padding: 18px 0; min-width: 0; }
.pl-key.pl-profile { font-size: var(--fs-sm); }
.pl-key.pl-profile.selected { border-color: var(--focus); color: var(--focus); background: var(--surface-hi); }
.pl-key.pl-action { font-size: var(--fs-sm); }
#btn-create { border-color: #7ee787; color: #7ee787; }
#error-msg { display: none; font-size: var(--fs-sm); color: #ff8787; padding: 12px 48px; }
</style>
</head>
<body id="screen-playlist-create">
<div style="display:flex;align-items:center;gap:24px;padding:22px 48px 6px;flex-shrink:0">
  <button id="btn-back-create" style="font-size:var(--fs-sm);padding:12px 20px;min-width:auto">&#8592; Back</button>
  <div id="create-title">New Playlist</div>
</div>
<div id="pl-name" class="placeholder">Playlist name</div>
<div id="error-msg"></div>
<div id="pl-keys"></div>
<script type="module">
import { initPlaylistCreatePage } from '../../ui/screens/screen-playlist-create-page.js';
initPlaylistCreatePage();
</script>
</body>
</html>
