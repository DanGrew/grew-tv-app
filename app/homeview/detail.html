<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grew TV</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0a; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
button { background: #1a1a1a; color: #fff; border: 3px solid #444; border-radius: 12px; font-size: 40px; padding: 28px 60px; cursor: pointer; min-width: 260px; text-align: center; }
button:focus { outline: none; border-color: #ff0; background: #1a1a00; color: #ff0; }
button:hover { background: #222; }
#detail-title { font-size: 48px; flex-shrink: 0; }
#detail-list { flex: 1; overflow-y: auto; padding: 0 60px 60px; }
.detail-row { display: flex; align-items: center; gap: 24px; padding: 20px; border: 3px solid #333; border-radius: 12px; margin-bottom: 16px; cursor: pointer; background: #1a1a1a; }
.detail-row:focus { outline: none; border-color: #ff0; }
.detail-row.unavailable { opacity: 0.4; cursor: default; }
.detail-thumb { width: 80px; height: 120px; object-fit: cover; background: #222; border-radius: 6px; flex-shrink: 0; }
.detail-thumb-placeholder { width: 80px; height: 120px; background: #1e1e1e; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 32px; flex-shrink: 0; }
.detail-info { flex: 1; }
.detail-label { font-size: 36px; line-height: 1.3; }
.detail-duration { font-size: 28px; color: #aaa; margin-top: 6px; }
.detail-desc { font-size: 26px; color: #888; margin-top: 6px; }
.detail-resume { font-size: 24px; color: #ff0; margin-top: 6px; }
#error-msg { display: none; }
</style>
</head>
<body>
<div style="display:flex;align-items:center;gap:32px;padding:40px 60px 24px;flex-shrink:0">
  <button id="btn-back-detail" style="font-size:28px;padding:16px 32px;min-width:auto">&#8592; Back</button>
  <div id="detail-title" style="padding:0;font-size:48px"></div>
</div>
<div id="detail-list"></div>
<div id="error-msg"></div>
<script type="module">
import { getParam, navTo } from '../../core/state.js';
import { initPage, dispatchKey } from '../../core/screen-registry.js';
import { buildDetailList, detailArrow, focusFirstDetailRow } from '../../ui/screens/screen-detail.js';
import { connectApp } from '../../core/app-ws.js';

var filmId = getParam('film');

var wsApp = connectApp('ws://localhost:8766', function(intent) {
  var INTENTS = {
    navigate_up:   function() { detailArrow({ key: 'ArrowUp',   preventDefault: function() {} }); },
    navigate_down: function() { detailArrow({ key: 'ArrowDown', preventDefault: function() {} }); },
    play:          function() { document.activeElement.click(); },
    back:          function() { goBack(null); }
  };
  [INTENTS[intent]].filter(Boolean).forEach(function(fn) { fn(); });
});
wsApp.sendContext({ context_id: 'detail', film_id: filmId });

function goBack(e) { [e].filter(Boolean).forEach(function(ev) { ev.preventDefault(); }); navTo('browse.html'); }

document.getElementById('btn-back-detail').addEventListener('click', goBack);
document.addEventListener('keydown', dispatchKey);

initPage({
  onEnter: focusFirstDetailRow,
  keys: {
    Escape:    function(e) { goBack(e); },
    Backspace: function(e) { goBack(e); },
    ArrowUp:   detailArrow,
    ArrowDown: detailArrow
  },
  remote: {}
});

fetch('http://localhost:8765/manifest.json', { cache: 'no-store' })
  .then(function(r) { return r.json(); })
  .then(function(manifest) {
    var film = manifest.content.filter(function(f) { return f.id === filmId; })[0];
    [film].filter(Boolean).forEach(function(f) {
      buildDetailList(f, manifest.contentBase, function(item, idx) {
        navTo('video.html', { film: filmId, item: idx, from: 'detail' });
      });
      focusFirstDetailRow();
    });
    [!film].filter(Boolean).forEach(function() { navTo('error.html'); });
  })
  .catch(function() { navTo('error.html'); });
</script>
</body>
</html>
