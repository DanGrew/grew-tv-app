<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grew TV</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0a; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
button { background: #1a1a1a; color: #fff; border: 3px solid #444; border-radius: 12px; font-size: 40px; padding: 28px 60px; cursor: pointer; min-width: 260px; text-align: center; }
button:focus { outline: none; border-color: #ff0; background: #1a1a00; color: #ff0; }
button:hover { background: #222; }
#detail-title { font-size: 48px; flex-shrink: 0; }
.detail-header-poster { width: 100px; height: 150px; object-fit: cover; background: #222; border-radius: 8px; flex-shrink: 0; }
.detail-header-placeholder { width: 100px; height: 150px; background: #1e1e1e; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 48px; flex-shrink: 0; }
#detail-list { flex: 1; overflow-y: auto; padding: 0 60px 60px; }
.detail-row { display: flex; align-items: center; gap: 24px; padding: 20px; border: 3px solid #333; border-radius: 12px; margin-bottom: 16px; cursor: pointer; background: #1a1a1a; }
.detail-row:focus { outline: none; border-color: #ff0; }
.detail-row.unavailable { opacity: 0.4; cursor: default; }
.detail-thumb { width: 80px; height: 120px; object-fit: cover; background: #222; border-radius: 6px; flex-shrink: 0; }
.detail-thumb-placeholder { width: 80px; height: 120px; background: #1e1e1e; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 32px; flex-shrink: 0; }
.detail-info { flex: 1; }
.detail-label { font-size: 36px; line-height: 1.3; }
.detail-duration { font-size: 28px; color: #aaa; margin-top: 6px; }
.detail-progress { height: 8px; background: rgba(255,255,255,0.18); border-radius: 4px; margin-top: 12px; max-width: 480px; }
.detail-progress-fill { height: 100%; background: #ff0; border-radius: 4px; width: 0; }
.detail-restart { font-size: 24px; padding: 14px 28px; min-width: auto; flex-shrink: 0; }
.detail-season { font-size: 30px; color: #888; font-weight: 700; padding: 24px 20px 8px; }
#btn-play-next { font-size: 32px; padding: 18px 40px; min-width: auto; }
#error-msg { display: none; }
</style>
</head>
<body id="screen-detail">
<div style="display:flex;align-items:center;gap:32px;padding:40px 60px 24px;flex-shrink:0">
  <button id="btn-back-detail" style="font-size:28px;padding:16px 32px;min-width:auto">&#8592; Back</button>
  <img id="detail-header-poster" class="detail-header-poster" alt="" style="display:none">
  <div id="detail-header-placeholder" class="detail-header-placeholder" style="display:none">&#127916;</div>
  <div id="detail-title" style="padding:0;font-size:48px;flex:1"></div>
  <button id="btn-play-next">&#9654; Play next</button>
</div>
<div id="detail-list"></div>
<div id="error-msg"></div>
<script type="module">
import { initDetailPage } from '../../ui/screens/screen-detail-page.js';
initDetailPage();
</script>
</body>
</html>
