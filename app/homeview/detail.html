<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grew TV</title>
<style>
:root {
  --bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 45%, #0f3460 100%);
  --surface: rgba(255,255,255,0.06);
  --surface-hi: rgba(255,255,255,0.11);
  --border: rgba(255,255,255,0.13);
  --focus: #fff;
  --focus-glow: 0 0 0 1px rgba(255,255,255,0.6), 0 4px 24px rgba(255,255,255,0.15);
  --text: rgba(255,255,255,0.95);
  --text-muted: rgba(255,255,255,0.4);
  --radius: 16px;
  --radius-sm: 8px;
  --dur: 0.18s;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
  --fs-xs: 18px;
  --fs-sm: 22px;
  --fs-md: 26px;
  --fs-lg: 32px;
  --fs-xl: 40px;
  --fs-2xl: 52px;
  --fs-3xl: 64px;
  --heading-ls: -0.5px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); background-attachment: fixed; background-size: cover; color: var(--text); font-family: var(--font); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
button { background: var(--surface); color: var(--text); border: 2.5px solid var(--border); border-radius: var(--radius); font-size: var(--fs-md); padding: 14px 26px; cursor: pointer; min-width: 140px; text-align: center; backdrop-filter: blur(14px) saturate(1.4); -webkit-backdrop-filter: blur(14px) saturate(1.4); transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), color var(--dur) var(--ease); }
button:focus { outline: none; border-color: var(--focus); box-shadow: var(--focus-glow); color: var(--focus); }
button:hover { background: var(--surface-hi); }
#detail-title { font-size: var(--fs-2xl); letter-spacing: var(--heading-ls); flex-shrink: 0; }
#detail-meta { font-size: var(--fs-sm); color: var(--text-muted); }
.detail-tag { font-size: var(--fs-xs); color: var(--focus); letter-spacing: 1px; margin-top: 6px; }
.detail-header-poster { width: 200px; aspect-ratio: 16/9; object-fit: contain; background: #000; border: 2.5px solid var(--border); border-radius: var(--radius); flex-shrink: 0; }
.detail-header-placeholder { width: 200px; aspect-ratio: 16/9; background: var(--surface-hi); border: 2.5px solid var(--border); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: var(--fs-xl); color: var(--text-muted); flex-shrink: 0; }
#detail-list { flex: 1; overflow-y: auto; padding: 0 48px 48px; }
.detail-row { display: flex; align-items: center; gap: 16px; padding: 12px 16px; border: 2.5px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; cursor: pointer; background: var(--surface); backdrop-filter: blur(14px) saturate(1.4); -webkit-backdrop-filter: blur(14px) saturate(1.4); transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), color var(--dur) var(--ease); }
.detail-row:focus { outline: none; border-color: var(--focus); box-shadow: var(--focus-glow); color: var(--focus); }
.detail-row.unavailable { opacity: 0.4; cursor: default; }
.detail-thumb { width: 104px; height: 60px; object-fit: cover; background: var(--surface-hi); border-radius: var(--radius-sm); flex-shrink: 0; }
.detail-thumb-placeholder { width: 104px; height: 60px; background: var(--surface-hi); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: var(--fs-md); color: var(--text-muted); flex-shrink: 0; }
.detail-info { flex: 1; }
.detail-label { font-size: var(--fs-md); line-height: 1.3; }
.detail-duration { font-size: var(--fs-xs); color: var(--text-muted); margin-top: 3px; }
.detail-progress { height: 4px; background: rgba(0,0,0,0.45); border-radius: 2px; margin-top: 8px; max-width: 320px; }
.detail-progress-fill { height: 100%; background: var(--focus); border-radius: 2px; width: 0; }
.detail-restart { font-size: var(--fs-xs); padding: 5px 12px; min-width: auto; flex-shrink: 0; border-width: 1.5px; }
.detail-season { font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 600; padding: 18px 16px 8px; }
#season-chips { display: flex; gap: 12px; flex-wrap: wrap; padding: 0 48px 14px; flex-shrink: 0; }
.season-chip { font-size: var(--fs-sm); padding: 8px 22px; min-width: auto; color: var(--text-muted); border-width: 2px; }
.season-chip.active { color: var(--text); background: var(--surface-hi); border-color: var(--surface-hi); }
.season-chip:focus { outline: none; border-color: var(--focus); box-shadow: var(--focus-glow); color: var(--focus); }
#btn-play-next { font-size: var(--fs-md); padding: 14px 26px; min-width: auto; border-color: var(--focus); color: var(--focus); box-shadow: var(--focus-glow); }
.breadcrumb { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.crumb { font-size: var(--fs-md); color: var(--text-muted); }
.crumb-current { color: var(--text); font-weight: 600; }
.crumb-link { background: none; border: 2px solid transparent; border-radius: var(--radius-sm); padding: 4px 12px; min-width: auto; font-size: var(--fs-md); color: var(--text-muted); }
.crumb-link:focus { outline: none; border-color: var(--focus); box-shadow: var(--focus-glow); color: var(--focus); }
.crumb-link:hover { color: var(--text); background: var(--surface-hi); }
.crumb-sep { color: var(--text-muted); font-size: var(--fs-md); }
#device-badge { position: fixed; top: 24px; right: 28px; z-index: 5; display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: var(--surface); border: 2px solid var(--border); border-radius: 999px; font-size: var(--fs-xs); color: var(--text-muted); backdrop-filter: blur(14px) saturate(1.4); -webkit-backdrop-filter: blur(14px) saturate(1.4); pointer-events: none; }
#device-swatch { width: 16px; height: 16px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.55); flex-shrink: 0; }
#error-msg { display: none; }
</style>
</head>
<body id="screen-detail">
<div id="breadcrumb" style="padding:22px 48px 0;flex-shrink:0"></div>
<div style="display:flex;align-items:center;gap:24px;padding:20px 48px 20px;flex-shrink:0">
  <button id="btn-back-detail" style="font-size:var(--fs-sm);padding:12px 20px;min-width:auto">&#8592; Back</button>
  <img id="detail-header-poster" class="detail-header-poster" alt="" style="display:none">
  <div id="detail-header-placeholder" class="detail-header-placeholder" style="display:none">&#127916;</div>
  <div style="flex:1;display:flex;flex-direction:column;gap:4px">
    <div id="detail-title" style="padding:0;font-size:var(--fs-2xl)"></div>
    <div id="detail-meta"></div>
  </div>
  <button id="btn-play-next">&#9654; Play next</button>
</div>
<div id="season-chips" style="display:none"></div>
<div id="detail-list"></div>
<div id="device-badge" title="This screen"></div>
<div id="error-msg"></div>
<script type="module">
import { initDetailPage } from '../../ui/screens/screen-detail-page.js';
import { mountDeviceBadge } from '../../ui/screens/device-badge.js';
mountDeviceBadge();
initDetailPage();
</script>
</body>
</html>
