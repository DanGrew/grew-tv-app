<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grew TV</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }
button { background: #1a1a1a; color: #fff; border: 3px solid #444; border-radius: 12px; font-size: 40px; padding: 28px 60px; cursor: pointer; min-width: 260px; text-align: center; }
button:focus { outline: none; border-color: #ff0; background: #1a1a00; color: #ff0; }
button:hover { background: #222; }
#screen-video { height: 100vh; background: #000; position: relative; }
video { width: 100%; height: 100vh; object-fit: contain; background: #000; }
#controls { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.85) 35%, rgba(0,0,0,0.97)); padding: 40px 60px 40px; display: flex; flex-direction: column; gap: 16px; transition: opacity 0.3s; }
#controls.hidden { opacity: 0; pointer-events: none; }
#film-title-video { position: fixed; top: 48px; left: 80px; font-size: 42px; font-weight: 700; text-shadow: 0 2px 8px rgba(0,0,0,0.8); transition: opacity 0.3s; pointer-events: none; }
#film-title-video.hidden { opacity: 0; }
.skip-popup { position: fixed; background: #1a1a1a; border: 3px solid #ff0; border-radius: 12px; display: flex; flex-direction: column; padding: 8px; gap: 4px; z-index: 100; }
#progress-bar-row { display: flex; align-items: center; gap: 32px; }
#btn-back-video { font-size: 28px; padding: 16px 32px; min-width: auto; }
#progress { flex: 1; height: 12px; background: rgba(255,255,255,0.18); border-radius: 6px; position: relative; }
#progress-fill { height: 100%; background: #ff0; border-radius: 6px; width: 0; }
#time-display { font-size: 30px; color: #aaa; min-width: 120px; text-align: right; }
#video-btn-row { display: flex; align-items: center; justify-content: space-between; }
#center-btns { display: flex; align-items: center; gap: 24px; }
#btn-play-pause { border-radius: 50%; width: 96px; height: 96px; font-size: 44px; padding: 0; min-width: unset; }
#btn-play-pause:focus { box-shadow: 0 0 20px rgba(255,255,0,0.3); }
#btn-cc { font-size: 28px; padding: 16px 32px; min-width: auto; font-weight: 700; letter-spacing: 2px; }
#btn-cc.hidden { display: none; }
#btn-cc.cc-off { opacity: 0.45; }
#error-msg { display: none; }
</style>
</head>
<body>
<div id="screen-video">
  <video id="video" preload="metadata"></video>
  <div id="film-title-video" class="hidden"></div>
  <div id="controls">
    <div id="progress-bar-row">
      <div id="progress"><div id="progress-fill"></div></div>
      <div id="time-display">0:00 / 0:00</div>
    </div>
    <div id="video-btn-row">
      <button id="btn-back-video">&#8592; Back</button>
      <div id="center-btns">
        <button id="btn-skip-back">&#171; Skip</button>
        <button id="btn-play-pause">&#9208;</button>
        <button id="btn-skip-fwd">Skip &#187;</button>
      </div>
      <div style="min-width:140px;display:flex;justify-content:flex-end">
        <button id="btn-cc" class="hidden" aria-label="Subtitles">CC</button>
      </div>
    </div>
  </div>
</div>
<div id="error-msg"></div>
<script type="module">
import { initVideoPage } from '../../ui/screens/screen-video-page.js';
initVideoPage();
</script>
</body>
</html>
