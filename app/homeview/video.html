<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grew TV</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }
button { background: #1a1a1a; color: #fff; border: 3px solid #444; border-radius: 12px; font-size: 40px; padding: 28px 60px; cursor: pointer; min-width: 260px; text-align: center; }
button:focus { outline: none; border-color: #ff0; background: #1a1a00; color: #ff0; }
button:hover { background: #222; }
#screen-video { height: 100vh; background: #000; position: relative; }
video { width: 100%; height: 100vh; object-fit: contain; background: #000; }
#controls { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.85) 35%, rgba(0,0,0,0.97)); padding: 40px 60px 40px; display: flex; flex-direction: column; gap: 16px; transition: opacity 0.3s; }
#controls.hidden { opacity: 0; pointer-events: none; }
#film-title-video { position: fixed; top: 48px; left: 80px; font-size: 42px; font-weight: 700; text-shadow: 0 2px 8px rgba(0,0,0,0.8); transition: opacity 0.3s; pointer-events: none; }
#film-title-video.hidden { opacity: 0; }
.skip-popup { position: fixed; background: #1a1a1a; border: 3px solid #ff0; border-radius: 12px; display: flex; flex-direction: column; padding: 8px; gap: 4px; z-index: 100; }
#progress-bar-row { display: flex; align-items: center; gap: 32px; }
#btn-back-video { font-size: 28px; padding: 16px 32px; min-width: auto; }
#progress { flex: 1; height: 12px; background: rgba(255,255,255,0.18); border-radius: 6px; position: relative; }
#progress-fill { height: 100%; background: #ff0; border-radius: 6px; width: 0; }
#time-display { font-size: 30px; color: #aaa; min-width: 120px; text-align: right; }
#video-btn-row { display: flex; align-items: center; justify-content: space-between; }
#center-btns { display: flex; align-items: center; gap: 24px; }
#btn-play-pause { border-radius: 50%; width: 96px; height: 96px; font-size: 44px; padding: 0; min-width: unset; }
#btn-play-pause:focus { box-shadow: 0 0 20px rgba(255,255,0,0.3); }
#screen-resume { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); flex-direction: column; justify-content: center; align-items: center; }
.btn-row { display: flex; gap: 32px; }
#error-msg { display: none; }
</style>
</head>
<body>
<div id="screen-video">
  <video id="video" preload="metadata"></video>
  <div id="film-title-video" class="hidden"></div>
  <div id="controls">
    <div id="progress-bar-row">
      <div id="progress"><div id="progress-fill"></div></div>
      <div id="time-display">0:00 / 0:00</div>
    </div>
    <div id="video-btn-row">
      <button id="btn-back-video">&#8592; Back</button>
      <div id="center-btns">
        <button id="btn-skip-back">&#171; Skip</button>
        <button id="btn-play-pause">&#9208;</button>
        <button id="btn-skip-fwd">Skip &#187;</button>
      </div>
      <div style="min-width:140px"></div>
    </div>
  </div>
</div>
<div id="screen-resume">
  <div style="font-size:48px;margin-bottom:60px;text-align:center">Resume from <span id="resume-time"></span>?</div>
  <div class="btn-row">
    <button id="btn-resume">Resume</button>
    <button id="btn-restart">Restart</button>
  </div>
</div>
<div id="error-msg"></div>
<script type="module">
import { getParam, navTo } from '../../core/state.js';
import { initPage, dispatchKey } from '../../core/screen-registry.js';
import { setup as setupPlayer } from '../../ui/screens/screen-video-player.js';
import { connectApp } from '../../core/app-ws.js';

var filmId = getParam('film');
var from   = [getParam('from')].filter(Boolean).concat(['browse'])[0];
var VIDEO_KEYS = ['Escape','Backspace',' ','Enter','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'];
var SKIP_ACTIONS = [
  'skip_back_10','skip_back_30','skip_back_120','skip_back_300','skip_back_900','skip_back_1800',
  'skip_fwd_10','skip_fwd_30','skip_fwd_120','skip_fwd_300','skip_fwd_900','skip_fwd_1800'
];

var player = null;
var wsApp = connectApp('ws://localhost:8766', function(intent, params) {
  [player].filter(Boolean).forEach(function() {
    [player.remote[intent]].filter(Boolean).forEach(function(fn) { fn(params); });
  });
});

document.addEventListener('keydown', dispatchKey);

fetch('http://localhost:8765/manifest.json', { cache: 'no-store' })
  .then(function(r) { return r.json(); })
  .then(function(manifest) {
    var film = manifest.content.filter(function(f) { return f.id === filmId; })[0];
    [!film].filter(Boolean).forEach(function() { navTo('error.html'); });
    [film].filter(Boolean).forEach(function(f) {
      player = setupPlayer({
        video: document.getElementById('video'),
        contentBase: manifest.contentBase,
        onStop: function(rp) {
          var STOP_NAV = {
            detail: function() { navTo('detail.html', { film: filmId }); },
            browse: function() { navTo('browse.html'); }
          };
          [STOP_NAV[rp]].filter(Boolean).forEach(function(fn) { fn(); });
          [!STOP_NAV[rp]].filter(Boolean).forEach(function() { navTo('browse.html'); });
        },
        onNext: function() {
          var idx = parseInt([getParam('item')].filter(Boolean).concat(['0'])[0]);
          [f.items[idx + 1]].filter(Boolean).forEach(function() {
            navTo('video.html', { film: filmId, item: idx + 1, from: from });
          });
        },
        onPrev: function() {
          var idx = parseInt([getParam('item')].filter(Boolean).concat(['0'])[0]);
          [f.items[idx - 1]].filter(Boolean).forEach(function() {
            navTo('video.html', { film: filmId, item: idx - 1, from: from });
          });
        },
        onIntent: function(intent) {
          var VIDEO_CTX = { play: true, video: true };
          [VIDEO_CTX[intent]].filter(Boolean).forEach(function() {
            wsApp.sendContext({ context_id: 'video', actions: SKIP_ACTIONS, display: player.currentVideoDisplay() });
          });
          [intent === 'resume_prompt'].filter(Boolean).forEach(function() {
            wsApp.sendContext({ context_id: 'resume_prompt' });
          });
        }
      });
      var keys = {};
      VIDEO_KEYS.forEach(function(k) { keys[k] = player.handleVideoKey; });
      initPage({ onEnter: function() { document.getElementById('btn-play-pause').focus(); }, keys: keys, remote: player.remote });
      var itemIdx = parseInt([getParam('item')].filter(Boolean).concat(['0'])[0]);
      player.playFilm(f, f.items[itemIdx], from);
    });
  })
  .catch(function() { navTo('error.html'); });
</script>
</body>
</html>
