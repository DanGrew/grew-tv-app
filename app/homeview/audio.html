<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grew TV</title>
<style>
:root {
  --bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 45%, #0f3460 100%);
  --surface: rgba(255,255,255,0.06);
  --surface-hi: rgba(255,255,255,0.11);
  --border: rgba(255,255,255,0.13);
  --focus: #fff;
  --focus-glow: 0 0 0 1px rgba(255,255,255,0.6), 0 4px 24px rgba(255,255,255,0.15);
  --text: rgba(255,255,255,0.95);
  --text-muted: rgba(255,255,255,0.4);
  --radius: 16px;
  --radius-sm: 8px;
  --dur: 0.18s;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
  --fs-xs: 18px;
  --fs-sm: 22px;
  --fs-md: 26px;
  --fs-lg: 32px;
  --fs-xl: 40px;
  --fs-2xl: 52px;
  --fs-3xl: 64px;
  --heading-ls: -0.5px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); background-attachment: fixed; background-size: cover; color: var(--text); font-family: var(--font); height: 100vh; overflow: hidden; }
button { background: none; color: var(--text); border: 2px solid transparent; border-radius: var(--radius); font-size: var(--fs-lg); padding: 0; cursor: pointer; text-align: center; transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), color var(--dur) var(--ease); }
button:focus { outline: none; border-color: var(--focus); box-shadow: var(--focus-glow); color: var(--focus); }
#screen-audio { height: 100vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 26px; padding-bottom: 220px; }
#amb-bg { position: fixed; inset: -40px; background-size: cover; background-position: center; filter: blur(60px) saturate(1.5); transform: scale(1.2); z-index: -2; }
#amb-scrim { position: fixed; inset: 0; background: radial-gradient(ellipse at center, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.6) 100%); z-index: -1; }
#audio-art { width: 280px; height: 280px; border-radius: 20px; background: var(--surface-hi); background-size: cover; background-position: center; backdrop-filter: blur(14px) saturate(1.4); -webkit-backdrop-filter: blur(14px) saturate(1.4); display: flex; align-items: center; justify-content: center; font-size: 120px; box-shadow: 0 16px 60px rgba(0,0,0,0.55); }
#audio-meta { text-align: center; }
#audio-title { font-size: calc(var(--fs-xl) * 2); font-weight: 700; letter-spacing: var(--heading-ls); }
#audio-artist { font-size: calc(var(--fs-md) * 2); color: var(--text-muted); margin-top: 6px; min-height: 26px; }
#amb-lyrics { display: none; flex-direction: column; align-items: center; gap: 26px; text-align: center; max-width: 80%; }
.amb-line { line-height: 1.3; transition: opacity 0.4s var(--ease), transform 0.4s var(--ease); }
#amb-prev, #amb-next { font-size: var(--fs-lg); color: rgba(255,255,255,0.32); min-height: 34px; }
#amb-cur { font-size: var(--fs-2xl); font-weight: 700; color: #fff; letter-spacing: var(--heading-ls); text-shadow: 0 2px 24px rgba(0,0,0,0.5); min-height: 58px; }
#amb-cur.bump { animation: amb-bump 0.45s var(--ease); }
@keyframes amb-bump { 0% { transform: translateY(8px); opacity: 0.4; } 100% { transform: translateY(0); opacity: 1; } }
body.lyrics-on #amb-lyrics { display: flex; }
body.lyrics-on #audio-art { display: none; }
body.lyrics-on #audio-meta { position: fixed; top: 26px; left: 32px; right: 32px; text-align: left; z-index: 1; }
body.lyrics-on #audio-title { font-size: var(--fs-md); }
body.lyrics-on #audio-artist { font-size: var(--fs-sm); margin-top: 2px; min-height: 18px; }
#controls { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.92)); backdrop-filter: blur(14px) saturate(1.4); -webkit-backdrop-filter: blur(14px) saturate(1.4); padding: 42px 40px 24px; display: flex; flex-direction: column; gap: 4px; transition: opacity 0.4s var(--ease), transform 0.4s var(--ease); }
#controls.controls-hidden { opacity: 0; transform: translateY(24px); pointer-events: none; }
.breadcrumb { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
.crumb { font-size: var(--fs-md); color: var(--text-muted); text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
.crumb-current { color: var(--text); font-weight: 600; }
.crumb-link { background: none; border: 2px solid transparent; border-radius: var(--radius-sm); padding: 4px 10px; min-width: auto; font-size: var(--fs-md); color: var(--text-muted); text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
.crumb-link:focus { outline: none; border-color: var(--focus); box-shadow: var(--focus-glow); color: var(--focus); }
.crumb-sep { color: var(--text-muted); font-size: var(--fs-md); }
#transport { display: flex; align-items: center; gap: 18px; margin-top: 14px; }
.ctrl-btn { font-size: var(--fs-lg); line-height: 1; min-width: 44px; height: 44px; color: var(--text-muted); border: none; }
.ctrl-btn:focus { color: var(--focus); border: none; box-shadow: none; }
.ctrl-btn.pill { font-size: var(--fs-sm); font-weight: 700; letter-spacing: 1px; border: 2px solid var(--border); border-radius: 999px; min-width: auto; height: auto; padding: 6px 16px; color: var(--text); }
.ctrl-btn.pill:focus { border-color: var(--focus); box-shadow: var(--focus-glow); color: var(--focus); }
.ctrl-btn.pill.on { border-color: var(--focus); color: var(--focus); background: var(--surface-hi); }
.ctrl-btn.pill.confirm { border-color: #ffce6b; color: #ffce6b; }
#btn-prev.hidden, #btn-next.hidden { display: none; }
#progress { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
#progress-fill { height: 100%; background: var(--focus); border-radius: 3px; width: 0; }
#time-display { font-size: var(--fs-sm); color: var(--text-muted); min-width: 110px; text-align: right; font-variant-numeric: tabular-nums; }
.jump-popup { position: fixed; background: var(--surface); backdrop-filter: blur(14px) saturate(1.4); -webkit-backdrop-filter: blur(14px) saturate(1.4); border: 2.5px solid var(--border); border-radius: var(--radius); padding: 18px; z-index: 100; box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
.jump-title { font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); text-align: center; margin-bottom: 12px; }
.jump-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.jump-grid button { font-size: var(--fs-sm); padding: 12px 8px; min-width: 62px; background: var(--surface-hi); border: 2px solid var(--border); color: var(--text); border-radius: var(--radius-sm); font-variant-numeric: tabular-nums; }
.jump-grid button:focus { border-color: var(--focus); color: var(--focus); box-shadow: var(--focus-glow); }
#device-badge { position: fixed; top: 24px; right: 28px; z-index: 5; display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: var(--surface); border: 2px solid var(--border); border-radius: 999px; font-size: var(--fs-xs); color: var(--text-muted); backdrop-filter: blur(14px) saturate(1.4); -webkit-backdrop-filter: blur(14px) saturate(1.4); pointer-events: none; transition: opacity 0.4s var(--ease); }
#controls.controls-hidden ~ #device-badge { opacity: 0; }
#device-swatch { width: 16px; height: 16px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.55); flex-shrink: 0; }
#error-msg { display: none; }
#queue-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: linear-gradient(135deg, rgba(26,26,46,0.92) 0%, rgba(22,33,62,0.94) 45%, rgba(15,52,96,0.96) 100%); backdrop-filter: blur(28px) saturate(1.4); -webkit-backdrop-filter: blur(28px) saturate(1.4); overflow-y: auto; padding: 44px 48px; }
#queue-overlay.open { display: block; }
#queue-overlay .q-crumb { font-size: 22px; color: var(--text-muted); margin-bottom: 22px; letter-spacing: 0.3px; }
#queue-overlay .q-crumb b { color: var(--text); font-weight: 600; }
.queue { max-width: 880px; margin: 0 auto; }
.rail-label { font-size: 22px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin: 28px 0 12px; }
.rail-label .hint { text-transform: none; letter-spacing: 0; opacity: 0.7; font-size: 18px; margin-left: 8px; }
.now-playing { display: flex; gap: 20px; align-items: center; padding: 18px 20px; background: var(--surface); border: 2.5px solid var(--focus); border-radius: var(--radius); box-shadow: var(--focus-glow); }
.np-art { flex: 0 0 96px; height: 96px; border-radius: var(--radius-sm); background: var(--surface-hi); display: flex; align-items: center; justify-content: center; font-size: 44px; color: var(--text-muted); }
.np-body { flex: 1; min-width: 0; }
.np-title { font-size: var(--fs-md); letter-spacing: var(--heading-ls); margin-bottom: 2px; }
.np-artist { font-size: var(--fs-xs); color: var(--text-muted); margin-bottom: 14px; }
.np-status { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.np-pill { font-size: 18px; border: 2px solid var(--border); border-radius: 999px; padding: 5px 14px; color: var(--text-muted); }
.np-pill.on { border-color: var(--focus); color: var(--focus); background: var(--surface-hi); }
.np-time { font-size: 18px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
.q-row { display: flex; align-items: center; gap: 14px; padding: 11px 14px; margin-bottom: 8px; background: var(--surface); border: 2.5px solid var(--border); border-radius: var(--radius); }
.q-row.queued { border-left-width: 6px; border-left-color: var(--focus); }
.q-select { flex: 1; min-width: 0; display: flex; align-items: center; gap: 14px; background: none; border: 2px solid transparent; border-radius: var(--radius-sm); padding: 4px 8px; color: inherit; text-align: left; }
.q-select:focus { outline: none; border-color: var(--focus); box-shadow: var(--focus-glow); color: var(--focus); }
.q-grip { width: 20px; text-align: center; color: var(--text-muted); font-size: 18px; }
.q-name { flex: 1; min-width: 0; font-size: 20px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.q-name .by { color: var(--text-muted); font-size: 16px; margin-left: 10px; }
.q-dur { font-size: 16px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
.q-actions { display: flex; gap: 6px; margin-left: 6px; }
.q-act { width: 40px; height: 40px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--surface-hi); color: var(--text-muted); font-size: 20px; line-height: 1; min-width: auto; display: flex; align-items: center; justify-content: center; }
.q-act:focus { outline: none; border-color: var(--focus); color: var(--focus); box-shadow: var(--focus-glow); }
.q-act.danger:focus { border-color: #ff6b6b; color: #ff6b6b; box-shadow: 0 0 0 1px rgba(255,107,107,0.5); }
.q-ends { font-size: 18px; color: var(--text-muted); font-style: italic; padding: 10px 14px; }
</style>
</head>
<body id="screen-audio-body">
<div id="screen-audio">
  <div id="amb-bg"></div>
  <div id="amb-scrim"></div>
  <audio id="audio" preload="metadata"></audio>
  <div id="audio-art">&#128191;</div>
  <div id="audio-meta">
    <div id="audio-title"></div>
    <div id="audio-artist"></div>
  </div>
  <div id="amb-lyrics">
    <div id="amb-prev" class="amb-line"></div>
    <div id="amb-cur" class="amb-line"></div>
    <div id="amb-next" class="amb-line"></div>
  </div>
  <div id="controls">
    <div id="breadcrumb"></div>
    <div id="transport">
      <button id="btn-prev" class="ctrl-btn" aria-label="Previous">&#9198;</button>
      <button id="btn-play-pause" class="ctrl-btn" aria-label="Play/Pause">&#9208;</button>
      <button id="btn-next" class="ctrl-btn" aria-label="Next">&#9197;</button>
      <button id="btn-shuffle" class="ctrl-btn pill" aria-label="Shuffle">&#128256; Shuffle</button>
      <button id="btn-repeat" class="ctrl-btn pill" aria-label="Repeat">&#128257; Repeat</button>
      <button id="btn-lyrics" class="ctrl-btn pill" aria-label="Lyrics">&#127925; Lyrics</button>
      <button id="btn-jump" class="ctrl-btn pill">Jump</button>
      <button id="btn-queue" class="ctrl-btn pill" aria-label="Queue">&#9776; Queue</button>
      <button id="btn-reset" class="ctrl-btn pill" aria-label="Reset progress">Reset</button>
      <div id="progress"><div id="progress-fill"></div></div>
      <div id="time-display">0:00 / 0:00</div>
    </div>
  </div>
  <div id="device-badge" title="This screen"></div>
</div>
<div id="queue-overlay">
  <div class="q-crumb">Home &#8250; Music &#8250; <b>Queue</b></div>
  <div id="queue-body" class="queue"></div>
</div>
<div id="error-msg"></div>
<script type="module">
import { initAudioPage } from '../../ui/screens/screen-audio-page.js';
import { mountDeviceBadge } from '../../ui/screens/device-badge.js';
mountDeviceBadge();
initAudioPage();
</script>
</body>
</html>
