<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grew TV</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0a; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }

#screen-profile,
#screen-browse,
#screen-error { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; }
#screen-video { display: none; height: 100vh; background: #000; position: relative; }
#screen-detail { display: none; height: 100vh; flex-direction: column; }
.active { display: flex !important; }
#screen-video.active { display: block !important; }

h1 { font-size: 64px; margin-bottom: 16px; letter-spacing: -1px; }
h2 { font-size: 40px; color: #aaa; margin-bottom: 60px; font-weight: normal; }
.error-msg { font-size: 32px; color: #f55; text-align: center; max-width: 700px; line-height: 1.5; margin-bottom: 40px; }

.btn-row { display: flex; gap: 32px; }
button {
  background: #1a1a1a; color: #fff; border: 3px solid #444;
  border-radius: 12px; font-size: 40px; padding: 28px 60px;
  cursor: pointer; min-width: 260px; text-align: center;
}
button:focus { outline: none; border-color: #ff0; background: #1a1a00; color: #ff0; }
button:hover { background: #222; }

#grid-container { width: 100vw; height: 100vh; overflow-y: auto; padding: 60px; }
#profile-label { font-size: 24px; color: #666; position: fixed; top: 24px; right: 40px; }
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 32px;
  max-width: 1400px;
  margin: 0 auto;
}
.film-tile {
  background: #1a1a1a; border: 3px solid #333; border-radius: 12px;
  cursor: pointer; overflow: hidden; transition: border-color 0.1s;
}
.film-tile:focus { outline: none; border-color: #ff0; }
.film-tile:focus .tile-title { color: #ff0; }
.film-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #222; display: block; }
.film-poster-placeholder { width: 100%; aspect-ratio: 2/3; background: #1e1e1e; display: flex; align-items: center; justify-content: center; font-size: 60px; }
.tile-title { font-size: 26px; padding: 16px 20px 20px; line-height: 1.3; }

#screen-video video { width: 100%; height: 100vh; object-fit: contain; background: #000; }
#controls {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
  padding: 40px 60px 40px;
  display: flex; flex-direction: column; gap: 16px;
  transition: opacity 0.3s;
}
#controls.hidden { opacity: 0; pointer-events: none; }
#skip-row { display: flex; gap: 8px; justify-content: space-between; }
.btn-skip { font-size: 24px; padding: 8px 12px; min-width: auto; flex: 1; }
#progress-row { display: flex; align-items: center; gap: 32px; }
#btn-back-video { font-size: 28px; padding: 16px 32px; min-width: auto; }
#film-title-video { font-size: 36px; flex: 1; }
#progress { flex: 2; height: 6px; background: #444; border-radius: 3px; position: relative; }
#progress-fill { height: 100%; background: #ff0; border-radius: 3px; width: 0; }
#time-display { font-size: 28px; color: #aaa; min-width: 120px; text-align: right; }

#detail-title { font-size: 48px; flex-shrink: 0; }
#detail-list { flex: 1; overflow-y: auto; padding: 0 60px 60px; }
.detail-row {
  display: flex; align-items: center; gap: 24px;
  padding: 20px; border: 3px solid #333; border-radius: 12px;
  margin-bottom: 16px; cursor: pointer; background: #1a1a1a;
}
.detail-row:focus { outline: none; border-color: #ff0; }
.detail-row.unavailable { opacity: 0.4; cursor: default; }
.detail-thumb { width: 80px; height: 120px; object-fit: cover; background: #222; border-radius: 6px; flex-shrink: 0; }
.detail-thumb-placeholder { width: 80px; height: 120px; background: #1e1e1e; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 32px; flex-shrink: 0; }
.detail-info { flex: 1; }
.detail-label { font-size: 36px; line-height: 1.3; }
.detail-duration { font-size: 28px; color: #aaa; margin-top: 6px; }
.detail-desc { font-size: 26px; color: #888; margin-top: 6px; }
.detail-resume { font-size: 24px; color: #ff0; margin-top: 6px; }
</style>
</head>
<body>

<div id="screen-profile">
  <h1>Grew TV</h1>
  <h2>Who's watching?</h2>
  <div class="btn-row">
    <button id="btn-kids" autofocus>Kids</button>
    <button id="btn-adults">Adults</button>
  </div>
</div>

<div id="screen-error">
  <h1>Grew TV</h1>
  <div class="error-msg" id="error-text">Can't reach the media library.<br>Is the Mac Mini on and connected?</div>
  <div class="btn-row">
    <button id="btn-retry" autofocus>Try Again</button>
  </div>
</div>

<div id="screen-browse">
  <div id="profile-label"></div>
  <div id="grid-container">
    <div id="grid"></div>
  </div>
</div>

<div id="screen-video">
  <video id="video" preload="metadata"></video>
  <div id="controls">
    <div id="skip-row">
      <button class="btn-skip" data-delta="-1800">«30m</button>
      <button class="btn-skip" data-delta="-900">«15m</button>
      <button class="btn-skip" data-delta="-300">«5m</button>
      <button class="btn-skip" data-delta="-120">«2m</button>
      <button class="btn-skip" data-delta="-30">«30s</button>
      <button class="btn-skip" data-delta="-10">«10s</button>
      <button class="btn-skip" data-delta="10">10s»</button>
      <button class="btn-skip" data-delta="30">30s»</button>
      <button class="btn-skip" data-delta="120">2m»</button>
      <button class="btn-skip" data-delta="300">5m»</button>
      <button class="btn-skip" data-delta="900">15m»</button>
      <button class="btn-skip" data-delta="1800">30m»</button>
    </div>
    <div id="progress-row">
      <button id="btn-back-video">← Back</button>
      <div id="film-title-video"></div>
      <div id="progress"><div id="progress-fill"></div></div>
      <div id="time-display">0:00 / 0:00</div>
    </div>
  </div>
</div>

<div id="screen-detail">
  <div style="display:flex;align-items:center;gap:32px;padding:40px 60px 24px;flex-shrink:0">
    <button id="btn-back-detail" style="font-size:28px;padding:16px 32px;min-width:auto">← Back</button>
    <div id="detail-title" style="padding:0;font-size:48px"></div>
  </div>
  <div id="detail-list"></div>
</div>

<script type="module">
import { fmt, pad } from '../../core/time.js';

var contentBase = '';
var profile = null;
var films = [];
var wakeLock = null;
var controlsTimer = null;
var currentBlobUrl = null;
var currentFilm = null;
var currentItem = null;
var currentItemIndex = -1;
var currentDetailFilm = null;
var detailSourceTile = null;
var returnScreen = 'screen-browse';
var lastSaveTime = 0;

var screenRegistry = {};
var activeScreen = null;

function registerScreen(id, config) {
  ['onEnter', 'keys'].filter(function(k) { return !config[k]; }).forEach(function(k) {
    throw new Error('registerScreen: ' + id + ' missing ' + k);
  });
  screenRegistry[id] = config;
}

var FILM_FILTER = {
  kids: function(f) { return f.profile === 'kids'; },
  adults: function() { return true; }
};
var TILE_ACTION = {
  'true': function(film) { playFilm(film, film.items[0], 'screen-browse'); },
  'false': function(film) { showDetail(film); }
};
var PROFILE_LABEL = { kids: 'Kids', adults: 'Adults' };
var TILE_PLAY_KEYS = { Enter: true, ' ': true };
var VIDEO_STOP_KEYS = { Escape: true, Backspace: true };
var VIDEO_PLAY_PAUSE_KEYS = { ' ': true, Enter: true };
var ARROW_DELTA = { ArrowRight: 1, ArrowDown: 1, ArrowLeft: -1, ArrowUp: -1 };
var DETAIL_ARROW_DELTA = { ArrowUp: -1, ArrowDown: 1 };
var DETAIL_BACK_KEYS = { Escape: true, Backspace: true };

var AVAILABLE_ROW = {
  'true':  { className: 'detail-row',             tabIndex: 0  },
  'false': { className: 'detail-row unavailable', tabIndex: -1 }
};

var DETAIL_SOURCE_TILE_UPDATE = {
  'true':  function() {},
  'false': function() { detailSourceTile = document.activeElement; }
};

var STOP_RESTORE = {
  'screen-detail': function() { showDetail(currentDetailFilm, true); },
  'screen-browse': function() { show('screen-browse'); }
};

var video = document.getElementById('video');

var VIDEO_TOGGLE = {
  'true': function() { video.play().catch(function() {}); },
  'false': function() { video.pause(); }
};

function show(id) {
  ['screen-profile','screen-browse','screen-error','screen-video','screen-detail'].forEach(function(s) {
    document.getElementById(s).classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
  activeScreen = id;
  screenRegistry[id].onEnter();
}

function acquireWakeLock() {
  [navigator.wakeLock].filter(Boolean).forEach(function(wl) {
    wl.request('screen').then(function(l) { wakeLock = l; }).catch(function() {});
  });
}

function revokeBlob() {
  URL.revokeObjectURL(currentBlobUrl);
  currentBlobUrl = null;
}

function releaseWakeLock() {
  [wakeLock].filter(Boolean).forEach(function(wl) { wl.release(); wakeLock = null; });
}

async function loadManifest() {
  return fetch('http://localhost:8765/manifest.json', { cache: 'no-store' })
    .then(function(res) { return res.json(); })
    .then(function(manifest) { contentBase = manifest.contentBase; return manifest.content; })
    .catch(function() { return null; });
}

function appendFilmTile(grid, film, i) {
  var tile = document.createElement('div');
  tile.className = 'film-tile';
  tile.tabIndex = 0;
  tile.setAttribute('data-index', i);
  var posterUrl = contentBase + film.poster;
  tile.innerHTML =
    '<img class="film-poster" src="' + posterUrl + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
    '<div class="film-poster-placeholder" style="display:none">🎬</div>' +
    '<div class="tile-title">' + film.title + '</div>';
  tile.addEventListener('click', function() { TILE_ACTION[film.items.length === 1](film); });
  tile.addEventListener('keydown', function(e) {
    [film].filter(function() { return TILE_PLAY_KEYS[e.key]; }).forEach(function(f) {
      e.preventDefault();
      TILE_ACTION[f.items.length === 1](f);
    });
  });
  grid.appendChild(tile);
}

function buildGrid(allFilms) {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('profile-label').textContent = PROFILE_LABEL[profile];
  var filtered = allFilms.filter(FILM_FILTER[profile]).filter(function(f) { return f.available !== false; });
  [grid].filter(function() { return filtered.length === 0; }).forEach(function(g) {
    g.innerHTML = '<div style="font-size:32px;color:#666;grid-column:1/-1;text-align:center;padding:80px 0">No films available</div>';
  });
  filtered.forEach(appendFilmTile.bind(null, grid));
  [grid.querySelector('.film-tile')].filter(Boolean).forEach(function(t) { t.focus(); });
}

function buildDetailRow(film, item, i) {
  var available = item.available !== false;
  var avConfig = AVAILABLE_ROW[available + ''];
  var row = document.createElement('div');
  row.className = avConfig.className;
  row.tabIndex = avConfig.tabIndex;
  row.setAttribute('data-index', i);

  var posterSrc = contentBase +
    ([item.poster].filter(Boolean).concat([film.poster].filter(Boolean)))[0];

  var thumbHtml =
    '<img class="detail-thumb" src="' + posterSrc + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
    '<div class="detail-thumb-placeholder" style="display:none">🎬</div>';

  var resumeKey = 'grew-tv-resume-' + film.id + '-' + item.id;
  var saved = localStorage.getItem(resumeKey);
  var resumeHtml = [saved].filter(Boolean).map(function(s) {
    return '<div class="detail-resume">\u25b6 Resume ' + fmt(parseFloat(s)) + '</div>';
  }).join('');
  var durationHtml = [item.duration].filter(Boolean).map(function(d) {
    return '<div class="detail-duration">' + d + '</div>';
  }).join('');
  var descHtml = [item.description].filter(Boolean).map(function(d) {
    return '<div class="detail-desc">' + d + '</div>';
  }).join('');
  var label = [item.label, item.title, 'Item ' + (i + 1)].filter(Boolean)[0];

  row.innerHTML = thumbHtml +
    '<div class="detail-info">' +
    '<div class="detail-label">' + label + '</div>' +
    durationHtml + descHtml + resumeHtml +
    '</div>';

  [row].filter(function() { return available; }).forEach(function(r) {
    r.addEventListener('click', function() { playFilm(film, item, 'screen-detail'); });
    r.addEventListener('keydown', function(e) {
      [e.key].filter(function(k) { return k === 'Enter'; }).forEach(function() {
        e.preventDefault();
        playFilm(film, item, 'screen-detail');
      });
    });
  });

  return row;
}

function showDetail(film, preserveSourceTile) {
  currentDetailFilm = film;
  DETAIL_SOURCE_TILE_UPDATE[!!preserveSourceTile]();
  document.getElementById('detail-title').textContent = film.title;
  var list = document.getElementById('detail-list');
  list.innerHTML = '';
  film.items.forEach(function(item, i) { list.appendChild(buildDetailRow(film, item, i)); });
  show('screen-detail');
}

function playFilm(film, item, from) {
  var playItem = [item].filter(Boolean).concat(film.items)[0];
  var playFrom = [from].filter(Boolean).concat(['screen-browse'])[0];
  var v = document.getElementById('video');
  [currentBlobUrl].filter(Boolean).forEach(revokeBlob);
  currentFilm = film;
  currentItem = playItem;
  currentItemIndex = film.items.indexOf(playItem);
  returnScreen = playFrom;
  v.src = contentBase + playItem.id + '.mp4';
  var labelSuffix = [playItem.label, playItem.title].filter(Boolean).map(function(l) {
    return ' \u2014 ' + l;
  }).concat([''])[0];
  document.getElementById('film-title-video').textContent = film.title + labelSuffix;
  show('screen-video');
  acquireWakeLock();
  v.muted = false;
  v.play().catch(function() {
    v.muted = true;
    v.play().catch(function() {});
  });
  var savedPos = parseFloat(localStorage.getItem('grew-tv-resume-' + film.id + '-' + playItem.id));
  [savedPos].filter(function(p) { return p > 0; }).forEach(function(p) { v.currentTime = p; });
  showControls();
}

function stopPlayback() {
  var v = document.getElementById('video');
  v.pause();
  v.src = '';
  releaseWakeLock();
  var rs = returnScreen;
  currentItem = null;
  currentFilm = null;
  currentItemIndex = -1;
  STOP_RESTORE[rs]();
}

function showControls() {
  var c = document.getElementById('controls');
  c.classList.remove('hidden');
  clearTimeout(controlsTimer);
  controlsTimer = setTimeout(function() { c.classList.add('hidden'); }, 3000);
}

function updateProgress() {
  var pct = (video.currentTime / video.duration) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('time-display').textContent = fmt(video.currentTime) + ' / ' + fmt(video.duration);
}

function togglePlayPause() {
  VIDEO_TOGGLE[video.paused]();
}

var SKIP_NAV = {
  ArrowLeft:  function() { skipFocusMove(-1); },
  ArrowRight: function() { skipFocusMove(1); },
  ArrowDown:  function() { document.getElementById('btn-back-video').focus(); }
};
var BACK_NAV = {
  ArrowUp: function() { [document.querySelector('.btn-skip')].filter(Boolean).forEach(function(b) { b.focus(); }); }
};

function skipFocusMove(delta) {
  var btns = Array.from(document.querySelectorAll('.btn-skip'));
  var idx = btns.indexOf(document.activeElement);
  [btns[idx + delta]].filter(Boolean).filter(function() { return idx > -1; }).forEach(function(b) { b.focus(); });
}

function handleVideoKey(e) {
  var onSkip = document.activeElement.classList.contains('btn-skip');
  var onBack = document.activeElement.id === 'btn-back-video';
  showControls();
  [stopPlayback].filter(function() { return VIDEO_STOP_KEYS[e.key]; }).forEach(function(f) { e.preventDefault(); f(); });
  [SKIP_NAV[e.key]].filter(Boolean).filter(function() { return onSkip; }).forEach(function(fn) { e.preventDefault(); fn(); });
  [BACK_NAV[e.key]].filter(Boolean).filter(function() { return onBack; }).forEach(function(fn) { e.preventDefault(); fn(); });
  [togglePlayPause].filter(function() { return VIDEO_PLAY_PAUSE_KEYS[e.key]; }).filter(function() { return !onSkip; }).filter(function() { return !onBack; }).forEach(function(f) { e.preventDefault(); f(); });
}

function onManifestError() {
  show('screen-error');
}

function onManifestLoaded(allFilms) {
  films = allFilms;
  show('screen-browse');
  buildGrid(films);
}

async function selectProfile(p) {
  profile = p;
  var allFilms = await loadManifest();
  [onManifestError].filter(function() { return allFilms === null; }).forEach(function(f) { f(); });
  [onManifestLoaded].filter(function() { return allFilms !== null; }).forEach(function(f) { f(allFilms); });
}

video.addEventListener('timeupdate', function() {
  [video.duration].filter(Boolean).forEach(updateProgress);
  [currentFilm].filter(Boolean).forEach(function(film) {
    var now = Date.now();
    [currentItem].filter(Boolean).filter(function() { return now - lastSaveTime > 5000; }).forEach(function() {
      lastSaveTime = now;
      localStorage.setItem('grew-tv-resume-' + film.id + '-' + currentItem.id, video.currentTime);
    });
  });
});

video.addEventListener('ended', stopPlayback);

document.getElementById('btn-back-video').addEventListener('click', stopPlayback);
Array.from(document.querySelectorAll('.btn-skip')).forEach(function(btn) {
  btn.addEventListener('click', function() {
    var delta = parseFloat(btn.getAttribute('data-delta'));
    video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + delta));
    showControls();
  });
});
document.getElementById('screen-video').addEventListener('click', function() { showControls(); });

document.addEventListener('keydown', function(e) {
  [screenRegistry[activeScreen]].filter(Boolean).forEach(function(sc) {
    [sc.keys[e.key]].filter(Boolean).forEach(function(h) { h(e); });
  });
});

function isDetailRowResumable(r) {
  return Boolean(localStorage.getItem('grew-tv-resume-' + currentDetailFilm.id + '-' + currentDetailFilm.items[parseInt(r.getAttribute('data-index'))].id));
}

document.getElementById('btn-back-detail').addEventListener('click', function() {
  show('screen-browse');
});
document.getElementById('btn-kids').addEventListener('click', function() { selectProfile('kids'); });
document.getElementById('btn-adults').addEventListener('click', function() { selectProfile('adults'); });
document.getElementById('btn-retry').addEventListener('click', function() {
  show('screen-profile');
});

(function() {
  var BACK_ACTIONS = {
    'screen-video':  function() { stopPlayback(); },
    'screen-detail': function() { show('screen-browse'); },
    'screen-browse': function() { show('screen-profile'); }
  };

  function goBack() {
    Object.keys(BACK_ACTIONS).filter(function(id) {
      return document.getElementById(id).classList.contains('active');
    }).forEach(function(id) { BACK_ACTIONS[id](); });
  }

  function navItems(selector, delta) {
    var items = Array.from(document.querySelectorAll(selector));
    var cur = items.indexOf(document.activeElement);
    var from = [cur].filter(function(i) { return i > -1; }).concat([-1])[0];
    [items[Math.max(0, Math.min(items.length - 1, from + delta))]].filter(Boolean).forEach(function(el) { el.focus(); });
  }

  var REMOTE_HANDLERS = {
    play:     function() { video.play().catch(function(){}); showControls(); },
    pause:    function() { video.pause(); showControls(); },
    next:     function() {
      [currentFilm].filter(Boolean).forEach(function(f) {
        [f.items[currentItemIndex + 1]].filter(Boolean).forEach(function(item) { playFilm(f, item, returnScreen); });
      });
    },
    prev:     function() {
      [currentFilm].filter(Boolean).forEach(function(f) {
        [f.items[currentItemIndex - 1]].filter(Boolean).forEach(function(item) { playFilm(f, item, returnScreen); });
      });
    },
    vol_up:   function() { video.volume = Math.min(1, video.volume + 0.1); showControls(); },
    vol_down: function() { video.volume = Math.max(0, video.volume - 0.1); showControls(); },
    up:       function() { navItems('#screen-profile.active button, #screen-browse.active .film-tile, #screen-detail.active .detail-row:not(.unavailable)', -1); },
    down:     function() { navItems('#screen-profile.active button, #screen-browse.active .film-tile, #screen-detail.active .detail-row:not(.unavailable)', 1); },
    left:     function() { navItems('#screen-profile.active button, #screen-browse.active .film-tile, #screen-detail.active .detail-row:not(.unavailable)', -1); },
    right:    function() { navItems('#screen-profile.active button, #screen-browse.active .film-tile, #screen-detail.active .detail-row:not(.unavailable)', 1); },
    select:   function() { [document.activeElement, document.body].filter(Boolean)[0].click(); },
    back:     function() { goBack(); }
  };

  function handleCmd(cmd) {
    var remote = screenRegistry[activeScreen].remote;
    var fn = [remote[cmd], REMOTE_HANDLERS[cmd]].filter(Boolean)[0];
    [fn].filter(Boolean).forEach(function(f) { f(); });
  }

  var browseArrow = function(e) {
    var delta = ARROW_DELTA[e.key];
    var tiles = Array.from(document.querySelectorAll('.film-tile'));
    var idx = tiles.indexOf(document.activeElement);
    e.preventDefault();
    [tiles[idx + delta]].filter(Boolean).filter(function() { return idx > -1; }).forEach(function(t) { t.focus(); });
  };

  var detailBack = function(e) {
    e.preventDefault();
    show('screen-browse');
  };

  var detailArrow = function(e) {
    e.preventDefault();
    var delta = DETAIL_ARROW_DELTA[e.key];
    var rows = Array.from(document.querySelectorAll('.detail-row:not(.unavailable)'));
    var idx = rows.indexOf(document.activeElement);
    [rows[idx + delta]].filter(Boolean).filter(function() { return idx > -1; }).forEach(function(r) { r.focus(); });
  };

  registerScreen('screen-profile', {
    onEnter: function() { document.getElementById('btn-kids').focus(); },
    keys: {},
    remote: {}
  });

  registerScreen('screen-error', {
    onEnter: function() { document.getElementById('btn-retry').focus(); },
    keys: {},
    remote: {}
  });

  registerScreen('screen-browse', {
    onEnter: function() {
      var target = detailSourceTile || document.querySelector('.film-tile');
      detailSourceTile = null;
      [target].filter(Boolean).forEach(function(t) { t.focus(); });
    },
    keys: { ArrowLeft: browseArrow, ArrowRight: browseArrow, ArrowUp: browseArrow, ArrowDown: browseArrow },
    remote: {}
  });

  registerScreen('screen-detail', {
    onEnter: function() {
      var list = document.getElementById('detail-list');
      var rows = Array.from(list.querySelectorAll('.detail-row:not(.unavailable)'));
      [rows.filter(isDetailRowResumable).concat(rows)[0]].filter(Boolean).forEach(function(r) { r.focus(); });
    },
    keys: { Escape: detailBack, Backspace: detailBack, ArrowUp: detailArrow, ArrowDown: detailArrow },
    remote: {}
  });

  registerScreen('screen-video', {
    onEnter: function() { document.getElementById('btn-back-video').focus(); },
    keys: {
      Escape:     handleVideoKey,
      Backspace:  handleVideoKey,
      ' ':        handleVideoKey,
      Enter:      handleVideoKey,
      ArrowLeft:  handleVideoKey,
      ArrowRight: handleVideoKey,
      ArrowUp:    handleVideoKey,
      ArrowDown:  handleVideoKey
    },
    remote: {
      play:     function() { video.play().catch(function(){}); showControls(); },
      pause:    function() { video.pause(); showControls(); },
      next:     function() { [currentFilm].filter(Boolean).forEach(function(f) { [f.items[currentItemIndex + 1]].filter(Boolean).forEach(function(item) { playFilm(f, item, returnScreen); }); }); },
      prev:     function() { [currentFilm].filter(Boolean).forEach(function(f) { [f.items[currentItemIndex - 1]].filter(Boolean).forEach(function(item) { playFilm(f, item, returnScreen); }); }); },
      vol_up:   function() { video.volume = Math.min(1, video.volume + 0.1); showControls(); },
      vol_down: function() { video.volume = Math.max(0, video.volume - 0.1); showControls(); }
    }
  });

  show('screen-profile');

  function poll() {
    fetch('http://localhost:8765/poll')
      .then(function(r) { return r.json(); })
      .then(function(data) { [data.cmd].filter(Boolean).forEach(handleCmd); })
      .catch(function() {})
      .then(function() { setTimeout(poll, 200); });
  }

  setTimeout(poll, 200);
}());
</script>
</body>
