<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grew TV</title>
<style>
:root {
  --bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 45%, #0f3460 100%);
  --surface: rgba(255,255,255,0.06);
  --surface-hi: rgba(255,255,255,0.11);
  --border: rgba(255,255,255,0.13);
  --focus: #fff;
  --focus-glow: 0 0 0 1px rgba(255,255,255,0.6), 0 4px 24px rgba(255,255,255,0.15);
  --text: rgba(255,255,255,0.95);
  --text-muted: rgba(255,255,255,0.4);
  --radius: 16px;
  --dur: 0.18s;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
  --heading-ls: -0.5px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); background-attachment: fixed; background-size: cover; color: var(--text); font-family: var(--font); height: 100vh; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; }
h1 { font-size: 46px; margin-bottom: 14px; letter-spacing: var(--heading-ls); }
.error-msg { font-size: 18px; color: #ff8a8a; text-align: center; max-width: 520px; line-height: 1.5; margin-bottom: 32px; }
.btn-row { display: flex; gap: 20px; }
button { background: var(--surface); color: var(--text); border: 2.5px solid var(--border); border-radius: var(--radius); font-size: 18px; padding: 14px 26px; cursor: pointer; min-width: 140px; text-align: center; backdrop-filter: blur(14px) saturate(1.4); -webkit-backdrop-filter: blur(14px) saturate(1.4); transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), color var(--dur) var(--ease); }
button:focus { outline: none; border-color: var(--focus); box-shadow: var(--focus-glow); color: var(--focus); }
button:hover { background: var(--surface-hi); }
</style>
</head>
<body id="screen-error">
<h1>Grew TV</h1>
<div class="error-msg" id="error-text">Can't reach the media library.<br>Is the Mac Mini on and connected?</div>
<div class="btn-row">
  <button id="btn-retry" autofocus>Try Again</button>
</div>
<script type="module">
import { navTo } from '../../core/state.js';
import { initPage, dispatchKey } from '../../core/screen-registry.js';
import { connectApp } from '../../core/app-ws.js';

document.getElementById('btn-retry').addEventListener('click', function() { navTo('profile.html'); });

var wsApp = connectApp('ws://localhost:8766', function(intent) {
  var INTENTS = {
    back:   function() { navTo('profile.html'); },
    select: function() { document.getElementById('btn-retry').click(); },
    retry:  function() { document.getElementById('btn-retry').click(); }
  };
  [INTENTS[intent]].filter(Boolean).forEach(function(fn) { fn(); });
});
wsApp.sendContext({ context_id: 'error' });
document.addEventListener('keydown', dispatchKey);
initPage({
  onEnter: function() { document.getElementById('btn-retry').focus(); },
  keys: {
    Enter: function(e) { e.preventDefault(); document.getElementById('btn-retry').click(); }
  },
  remote: {
    select: function() { document.getElementById('btn-retry').click(); },
    back:   function() { document.getElementById('btn-retry').click(); }
  }
});
</script>
</body>
</html>
