<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grew TV</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0a; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; }
h1 { font-size: 64px; margin-bottom: 16px; letter-spacing: -1px; }
.error-msg { font-size: 32px; color: #f55; text-align: center; max-width: 700px; line-height: 1.5; margin-bottom: 40px; }
.btn-row { display: flex; gap: 32px; }
button { background: #1a1a1a; color: #fff; border: 3px solid #444; border-radius: 12px; font-size: 40px; padding: 28px 60px; cursor: pointer; min-width: 260px; text-align: center; }
button:focus { outline: none; border-color: #ff0; background: #1a1a00; color: #ff0; }
button:hover { background: #222; }
</style>
</head>
<body>
<h1>Grew TV</h1>
<div class="error-msg" id="error-text">Can't reach the media library.<br>Is the Mac Mini on and connected?</div>
<div class="btn-row">
  <button id="btn-retry" autofocus>Try Again</button>
</div>
<script type="module">
import { navTo } from '../../core/state.js';
import { initPage, dispatchKey } from '../../core/screen-registry.js';

document.getElementById('btn-retry').addEventListener('click', function() { navTo('profile.html'); });
document.addEventListener('keydown', dispatchKey);
initPage({
  onEnter: function() { document.getElementById('btn-retry').focus(); },
  keys: {
    Enter: function(e) { e.preventDefault(); document.getElementById('btn-retry').click(); }
  },
  remote: {
    select: function() { document.getElementById('btn-retry').click(); },
    back:   function() { document.getElementById('btn-retry').click(); }
  }
});
</script>
</body>
</html>
