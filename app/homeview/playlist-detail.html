<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grew TV</title>
<style>
:root {
  --bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 45%, #0f3460 100%);
  --surface: rgba(255,255,255,0.06);
  --surface-hi: rgba(255,255,255,0.11);
  --border: rgba(255,255,255,0.13);
  --focus: #fff;
  --focus-glow: 0 0 0 1px rgba(255,255,255,0.6), 0 4px 24px rgba(255,255,255,0.15);
  --text: rgba(255,255,255,0.95);
  --text-muted: rgba(255,255,255,0.4);
  --radius: 16px;
  --radius-sm: 8px;
  --dur: 0.18s;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
  --fs-xs: 18px;
  --fs-sm: 22px;
  --fs-md: 26px;
  --fs-lg: 32px;
  --fs-xl: 40px;
  --fs-2xl: 52px;
  --fs-3xl: 64px;
  --heading-ls: -0.5px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); background-attachment: fixed; background-size: cover; color: var(--text); font-family: var(--font); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
button { background: var(--surface); color: var(--text); border: 2.5px solid var(--border); border-radius: var(--radius); font-size: var(--fs-md); padding: 14px 26px; cursor: pointer; min-width: 140px; text-align: center; backdrop-filter: blur(14px) saturate(1.4); -webkit-backdrop-filter: blur(14px) saturate(1.4); transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), color var(--dur) var(--ease); }
button:focus { outline: none; border-color: var(--focus); box-shadow: var(--focus-glow); color: var(--focus); }
button:hover { background: var(--surface-hi); }
#detail-title { font-size: var(--fs-2xl); letter-spacing: var(--heading-ls); flex-shrink: 0; }
.detail-header-poster { width: 160px; aspect-ratio: 1/1; object-fit: cover; background: #000; border: 2.5px solid var(--border); border-radius: var(--radius); flex-shrink: 0; }
.detail-header-placeholder { width: 160px; aspect-ratio: 1/1; background: var(--surface-hi); border: 2.5px solid var(--border); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: var(--fs-3xl); color: var(--text-muted); flex-shrink: 0; }
#detail-list { flex: 1; overflow-y: auto; padding: 0 48px 48px; }
.detail-row { display: flex; align-items: center; gap: 16px; padding: 12px 16px; border: 2.5px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; cursor: pointer; background: var(--surface); backdrop-filter: blur(14px) saturate(1.4); -webkit-backdrop-filter: blur(14px) saturate(1.4); transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), color var(--dur) var(--ease); }
.detail-row:focus { outline: none; border-color: var(--focus); box-shadow: var(--focus-glow); color: var(--focus); }
.detail-row.unavailable { opacity: 0.4; cursor: default; }
.detail-thumb { width: 60px; height: 60px; object-fit: cover; background: var(--surface-hi); border-radius: var(--radius-sm); flex-shrink: 0; }
.detail-thumb-placeholder { width: 60px; height: 60px; background: var(--surface-hi); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: var(--fs-lg); color: var(--text-muted); flex-shrink: 0; }
.detail-info { flex: 1; }
.detail-label { font-size: var(--fs-md); line-height: 1.3; }
.detail-duration { font-size: var(--fs-xs); color: var(--text-muted); margin-top: 3px; }
.detail-progress { height: 4px; background: rgba(0,0,0,0.45); border-radius: 2px; margin-top: 8px; max-width: 320px; }
.detail-progress-fill { height: 100%; background: var(--focus); border-radius: 2px; width: 0; }
.detail-restart { font-size: var(--fs-xs); padding: 5px 12px; min-width: auto; flex-shrink: 0; border-width: 1.5px; }
.detail-add { font-size: var(--fs-xs); padding: 5px 12px; min-width: auto; flex-shrink: 0; border-width: 1.5px; }
.detail-move-up, .detail-move-down, .detail-remove { font-size: var(--fs-sm); padding: 5px 14px; min-width: auto; flex-shrink: 0; border-width: 1.5px; line-height: 1; }
.detail-remove.danger { border-color: rgba(255,135,135,0.5); color: #ff8787; }
.detail-remove.danger:focus { outline: none; border-color: #ff8787; box-shadow: var(--focus-glow); color: #ff8787; }
.detail-season { font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 600; padding: 18px 16px 8px; }
.detail-empty { font-size: var(--fs-md); color: var(--text-muted); padding: 32px 16px; }
#btn-play-next { font-size: var(--fs-md); padding: 14px 26px; min-width: auto; border-color: var(--focus); color: var(--focus); box-shadow: var(--focus-glow); }
#btn-shuffle { font-size: var(--fs-md); padding: 14px 22px; min-width: auto; }
#btn-shuffle.hidden { display: none; }
#btn-add-all { font-size: var(--fs-sm); padding: 12px 18px; min-width: auto; }
#add-sheet { position: fixed; inset: 0; z-index: 10; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
.add-sheet-panel { background: var(--surface); border: 2.5px solid var(--border); border-radius: var(--radius); padding: 32px; width: 560px; max-height: 80vh; display: flex; flex-direction: column; gap: 14px; backdrop-filter: blur(20px) saturate(1.4); -webkit-backdrop-filter: blur(20px) saturate(1.4); }
.add-sheet-title { font-size: var(--fs-lg); }
#add-sheet-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
.add-choice { text-align: left; }
.add-queue { text-align: left; background: var(--surface-hi); border-color: var(--focus); }
#add-status { position: fixed; left: 50%; bottom: 48px; transform: translateX(-50%); z-index: 11; padding: 14px 28px; background: var(--surface-hi); border: 2.5px solid var(--border); border-radius: var(--radius); font-size: var(--fs-md); backdrop-filter: blur(14px) saturate(1.4); -webkit-backdrop-filter: blur(14px) saturate(1.4); }
.breadcrumb { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.crumb { font-size: var(--fs-md); color: var(--text-muted); }
.crumb-current { color: var(--text); font-weight: 600; }
.crumb-link { background: none; border: 2px solid transparent; border-radius: var(--radius-sm); padding: 4px 12px; min-width: auto; font-size: var(--fs-md); color: var(--text-muted); }
.crumb-link:focus { outline: none; border-color: var(--focus); box-shadow: var(--focus-glow); color: var(--focus); }
.crumb-link:hover { color: var(--text); background: var(--surface-hi); }
.crumb-sep { color: var(--text-muted); font-size: var(--fs-md); }
#device-badge { position: fixed; top: 24px; right: 28px; z-index: 5; display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: var(--surface); border: 2px solid var(--border); border-radius: 999px; font-size: var(--fs-xs); color: var(--text-muted); backdrop-filter: blur(14px) saturate(1.4); -webkit-backdrop-filter: blur(14px) saturate(1.4); pointer-events: none; }
#device-swatch { width: 16px; height: 16px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.55); flex-shrink: 0; }
#error-msg { display: none; }
</style>
</head>
<body id="screen-playlist-detail">
<div id="breadcrumb" style="padding:22px 48px 0;flex-shrink:0"></div>
<div style="display:flex;align-items:center;gap:24px;padding:20px 48px 20px;flex-shrink:0">
  <div id="detail-header-mosaic" class="detail-header-poster" style="display:none;padding:0;overflow:hidden"></div>
  <div id="detail-header-placeholder" class="detail-header-placeholder" style="display:none">&#127925;</div>
  <div id="detail-title" style="padding:0;font-size:var(--fs-2xl);flex:1"></div>
  <button id="btn-play-next">&#9654; Play</button>
  <button id="btn-shuffle">&#128256; Shuffle</button>
  <button id="btn-add-all">&#65291; Add all to playlist</button>
  <button id="btn-rename-playlist" style="font-size:var(--fs-sm);padding:12px 18px;min-width:auto">&#9998; Rename</button>
  <button id="btn-delete-playlist" style="font-size:var(--fs-sm);padding:12px 18px;min-width:auto">&#128465; Delete</button>
</div>
<div id="detail-list"></div>
<div id="add-sheet" style="display:none" role="dialog" aria-modal="true">
  <div class="add-sheet-panel">
    <div class="add-sheet-title">Add to playlist</div>
    <div id="add-sheet-list"></div>
    <button id="btn-add-create">&#65291; New playlist</button>
    <button id="btn-add-cancel">Cancel</button>
  </div>
</div>
<div id="add-status" style="display:none"></div>
<div id="confirm-delete" style="display:none;position:fixed;inset:0;z-index:10;align-items:center;justify-content:center;background:rgba(0,0,0,0.62);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)">
  <div style="background:var(--surface-hi);border:2.5px solid var(--border);border-radius:var(--radius);padding:36px 44px;max-width:600px;text-align:center;backdrop-filter:blur(14px) saturate(1.4);-webkit-backdrop-filter:blur(14px) saturate(1.4)">
    <div style="font-size:var(--fs-lg);margin-bottom:10px">Delete this playlist?</div>
    <div id="confirm-delete-name" style="font-size:var(--fs-md);color:var(--text-muted);margin-bottom:28px"></div>
    <div style="display:flex;gap:18px;justify-content:center">
      <button id="btn-confirm-delete" style="border-color:#ff8787;color:#ff8787">Delete</button>
      <button id="btn-cancel-delete">Cancel</button>
    </div>
  </div>
</div>
<div id="device-badge" title="This screen"></div>
<div id="error-msg"></div>
<script type="module">
import { initPlaylistDetailPage } from '../../ui/screens/screen-playlist-detail-page.js';
import { mountDeviceBadge } from '../../ui/screens/device-badge.js';
mountDeviceBadge();
initPlaylistDetailPage();
</script>
</body>
</html>
