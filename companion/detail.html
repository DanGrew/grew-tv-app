<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>grew-tv</title>
<style>
:root {
  --bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 45%, #0f3460 100%);
  --surface: rgba(255,255,255,0.06);
  --surface-hi: rgba(255,255,255,0.11);
  --border: rgba(255,255,255,0.13);
  --focus: #fff;
  --text: rgba(255,255,255,0.95);
  --text-muted: rgba(255,255,255,0.4);
  --radius: 16px;
  --radius-sm: 8px;
  --dur: 0.18s;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); background-attachment: fixed; color: var(--text); font-family: var(--font); }
body { display: flex; flex-direction: column; padding: 16px; gap: 10px; }
#conn-status { font-size: 13px; font-family: monospace; color: var(--text-muted); text-align: center; height: 16px; flex-shrink: 0; }
#ctx-label { font-size: 12px; color: var(--text-muted); text-align: center; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; min-height: 16px; }
#ctx-title { font-size: 20px; color: var(--text); text-align: center; flex-shrink: 0; min-height: 28px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#actions { flex: 1; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-top: 4px; }
.back-btn { align-self: flex-start; padding: 10px 16px; border-radius: var(--radius-sm); border: 2px solid var(--border); background: var(--surface); color: var(--text); font-size: 16px; cursor: pointer; flex-shrink: 0; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.back-btn:active { background: var(--surface-hi); border-color: var(--focus); color: var(--focus); }
.no-actions { color: var(--text-muted); font-size: 16px; text-align: center; margin-top: 40px; }
.tile-btn { display: flex; flex-direction: column; background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; cursor: pointer; padding: 0; color: var(--text); width: 100%; max-width: 2in; flex-shrink: 0; transition: border-color var(--dur) var(--ease); }
.tile-btn img { width: 100%; height: 100px; object-fit: contain; background: #000; flex-shrink: 0; }
.tile-btn span { color: var(--text); font-size: 14px; padding: 6px 8px; text-align: left; flex-shrink: 0; }
.tile-btn:active { border-color: var(--focus); }
.ep-progress { height: 4px; background: rgba(0,0,0,0.45); margin: 0 8px 8px; border-radius: 2px; }
.ep-progress-fill { height: 100%; background: var(--focus); border-radius: 2px; width: 0; }
.play-next-btn { padding: 12px 16px; border-radius: var(--radius-sm); border: 2px solid var(--focus); background: var(--surface-hi); color: var(--focus); font-size: 16px; font-weight: 700; cursor: pointer; flex-shrink: 0; touch-action: manipulation; }
.play-next-btn:active { background: var(--surface); }
#breadcrumb { flex-shrink: 0; }
.breadcrumb { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
.crumb { font-size: 13px; }
.crumb-current { color: var(--text-muted); }
.crumb-sep { color: var(--text-muted); font-size: 13px; }
.crumb-link { background: none; border: none; padding: 2px 4px; margin: 0; color: var(--text); font-size: 13px; font-family: inherit; cursor: pointer; border-radius: var(--radius-sm); touch-action: manipulation; transition: color var(--dur) var(--ease); }
.crumb-link:active { color: var(--focus); }
.crumb-link:focus { outline: 1px solid var(--focus); }
#screen-bar { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; flex-shrink: 0; }
#screen-bar:empty { display: none; }
.screen-bar-label { width: 100%; font-size: 12px; color: var(--text-muted); text-align: center; text-transform: uppercase; letter-spacing: 1px; }
.screen-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; width: 100%; }
.screen-current { padding: 8px 14px; border: 2px solid var(--border); border-radius: 999px; background: var(--surface); color: var(--text); font-size: 14px; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.screen-current:active, .screen-current:focus { outline: none; border-color: var(--focus); color: var(--focus); }
.screen-btn { padding: 10px 16px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 15px; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.screen-btn:active, .screen-btn:focus { outline: none; border-color: var(--focus); color: var(--focus); }
.screen-btn.on { border-color: var(--focus); color: var(--focus); }
.screen-swatch { width: 14px; height: 14px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.55); flex-shrink: 0; }
.screen-btn, .screen-current { display: inline-flex; align-items: center; gap: 8px; }
</style>
</head>
<body>
<div id="conn-status">connecting\u2026</div>
<div id="screen-bar"></div>
<div id="breadcrumb"></div>
<div id="ctx-label"></div>
<div id="ctx-title"></div>
<button id="btn-back" class="back-btn">← Back</button>
<div id="actions"></div>
<script type="module">
import { initPage } from '../ui/screens/companion-detail.js';
initPage();
</script>
</body>
</html>
