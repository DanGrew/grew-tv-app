<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>grew-tv</title>
<style>
:root {
  --bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 45%, #0f3460 100%);
  --surface: rgba(255,255,255,0.06);
  --surface-hi: rgba(255,255,255,0.11);
  --border: rgba(255,255,255,0.13);
  --focus: #fff;
  --text: rgba(255,255,255,0.95);
  --text-muted: rgba(255,255,255,0.4);
  --radius: 16px;
  --radius-sm: 8px;
  --dur: 0.18s;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); background-attachment: fixed; color: var(--text); font-family: var(--font); }
body { display: flex; flex-direction: column; padding: 16px; gap: 12px; }
#conn-status { font-size: 13px; font-family: monospace; color: var(--text-muted); text-align: center; height: 16px; flex-shrink: 0; }
#ctx-label { font-size: 12px; color: var(--text-muted); text-align: center; text-transform: uppercase; letter-spacing: 1px; min-height: 16px; }
#now-title { font-size: 22px; color: var(--text); text-align: center; min-height: 28px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.still { height: 150px; background: #000; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--text-muted); flex-shrink: 0; }
.bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.bar > i { display: block; height: 100%; width: 0; background: var(--focus); }
.time { font-size: 13px; color: var(--text-muted); text-align: right; font-variant-numeric: tabular-nums; }
.transport { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.transport button { flex: 1; padding: 18px 8px; border-radius: var(--radius); border: 2px solid var(--border); background: var(--surface); color: var(--text); font-size: 24px; cursor: pointer; touch-action: manipulation; transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.transport button:active { background: var(--surface-hi); border-color: var(--focus); color: var(--focus); }
.transport .cc { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
.transport .cc.on { border-color: var(--focus); color: var(--focus); background: var(--surface-hi); }
.transport .rp.on { border-color: var(--focus); color: var(--focus); background: var(--surface-hi); }
.transport button.single { opacity: 0.35; pointer-events: none; }
.footer-row { display: flex; gap: 8px; align-items: stretch; margin-top: 12px; }
.reset-btn { flex: 1; min-width: 0; padding: 14px; border-radius: var(--radius); border: 2px solid var(--border); background: var(--surface); color: var(--text); font-size: 16px; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.reset-btn.confirm { border-color: #ffce6b; color: #ffce6b; }
.jump { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.jump-btn { padding: 12px 4px; border-radius: var(--radius-sm); border: 2px solid var(--border); background: var(--surface-hi); color: var(--text); font-size: 13px; cursor: pointer; touch-action: manipulation; font-variant-numeric: tabular-nums; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.jump-btn:active { background: var(--surface-hi); border-color: var(--focus); color: var(--focus); }
.bignext { background: var(--surface-hi); border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 12px; text-align: center; font-size: 14px; color: var(--text-muted); min-height: 44px; }
#breadcrumb { flex-shrink: 0; }
.breadcrumb { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
.crumb { font-size: 13px; }
.crumb-current { color: var(--text-muted); }
.crumb-sep { color: var(--text-muted); font-size: 13px; }
.crumb-link { background: none; border: none; padding: 2px 4px; margin: 0; color: var(--text); font-size: 13px; font-family: inherit; cursor: pointer; border-radius: var(--radius-sm); touch-action: manipulation; transition: color var(--dur) var(--ease); }
.crumb-link:active { color: var(--focus); }
.crumb-link:focus { outline: 1px solid var(--focus); }
#screen-bar { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; flex-shrink: 0; }
#screen-bar:empty { display: none; }
.screen-bar-label { width: 100%; font-size: 12px; color: var(--text-muted); text-align: center; text-transform: uppercase; letter-spacing: 1px; }
.screen-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; width: 100%; }
.screen-current { padding: 8px 14px; border: 2px solid var(--border); border-radius: 999px; background: var(--surface); color: var(--text); font-size: 14px; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.screen-current:active, .screen-current:focus { outline: none; border-color: var(--focus); color: var(--focus); }
.screen-btn { padding: 10px 16px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 15px; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.screen-btn:active, .screen-btn:focus { outline: none; border-color: var(--focus); color: var(--focus); }
.screen-btn.on { border-color: var(--focus); color: var(--focus); }
.screen-swatch { width: 14px; height: 14px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.55); flex-shrink: 0; }
.screen-btn, .screen-current { display: inline-flex; align-items: center; gap: 8px; }
#sync-bar { display: flex; align-items: center; justify-content: flex-end; gap: 10px; flex-shrink: 0; padding: 2px; }
.seg { display: inline-flex; flex: 0 0 auto; border: 2px solid var(--border); border-radius: 999px; overflow: hidden; }
.seg-opt { font-size: 14px; padding: 8px 16px; border: none; background: transparent; color: var(--text-muted); font-family: inherit; cursor: pointer; touch-action: manipulation; transition: background var(--dur) var(--ease), color var(--dur) var(--ease); }
.seg-opt.on { background: var(--surface-hi); color: var(--focus); }
.seg-opt:active { color: var(--focus); }
.seg-opt:focus { outline: 2px solid var(--focus); outline-offset: -2px; }
.desync-off { opacity: 0.35; pointer-events: none; }
.browsing .transport, .browsing #jump, .browsing #c-reset { opacity: 0.35; pointer-events: none; }
</style>
</head>
<body>
<div id="conn-status">connecting…</div>
<div id="screen-bar"></div>
<div id="sync-bar"></div>
<div id="breadcrumb"></div>
<div id="ctx-label"></div>
<div id="now-title"></div>
<div class="still">▶</div>
<div class="bar"><i id="bar-fill"></i></div>
<div id="time" class="time"></div>
<div class="transport">
  <button id="c-prev" aria-label="Previous">⏮</button>
  <button id="c-toggle" aria-label="Play/Pause">⏯</button>
  <button id="c-next" aria-label="Next">⏭</button>
  <button id="c-repeat" class="rp" aria-label="Repeat">🔁</button>
  <button id="c-cc" class="cc" aria-label="Subtitles">CC</button>
</div>
<div class="transport">
  <button id="c-vol-down" aria-label="Volume down">🔉</button>
  <button id="c-vol-up" aria-label="Volume up">🔊</button>
</div>
<div class="jump" id="jump"></div>
<div id="upnext" class="bignext"></div>
<div class="footer-row">
  <button id="c-queue" class="reset-btn" aria-label="Queue">☰ Queue</button>
  <button id="c-reset" class="reset-btn" aria-label="Reset">&#8635; Reset</button>
</div>
<script type="module">
import { initPage } from '../ui/screens/companion-video.js';
initPage();
</script>
</body>
</html>
