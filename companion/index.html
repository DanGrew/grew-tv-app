<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>grew-tv</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #111; color: #fff; font-family: sans-serif; }
body { display: flex; flex-direction: column; padding: 16px; gap: 10px; }
#conn-status { font-size: 13px; font-family: monospace; color: #555; text-align: center; height: 16px; flex-shrink: 0; }
#ctx-label { font-size: 12px; color: #444; text-align: center; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; min-height: 16px; }
#ctx-title { font-size: 20px; color: #ccc; text-align: center; flex-shrink: 0; min-height: 28px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#actions { flex: 1; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-top: 4px; }
.action-btn {
  width: 100%; padding: 22px 16px; border-radius: 12px; border: none;
  background: #2a2a2a; color: #fff; font-size: 22px; cursor: pointer;
  touch-action: manipulation; transition: background 0.1s, transform 0.08s;
}
.action-btn:active { background: #f0c040; color: #111; transform: scale(0.97); }
.no-actions { color: #333; font-size: 16px; text-align: center; margin-top: 40px; }
.tile-btn {
  display: flex; flex-direction: column;
  background: #1a1a1a; border: none; border-radius: 8px;
  overflow: hidden; cursor: pointer; padding: 0; color: #fff;
  width: 100%; max-width: 2in; flex-shrink: 0;
}
.tile-btn img { width: 100%; height: 100px; object-fit: cover; flex-shrink: 0; }
.tile-btn span { color: #fff; font-size: 14px; padding: 6px 8px; text-align: left; flex-shrink: 0; }
.tile-btn:active { opacity: 0.7; }
.ctrl-row { display: flex; gap: 10px; }
.ctrl-btn { flex: 1; padding: 22px 16px; border-radius: 12px; border: none;
  background: #2a2a2a; color: #fff; font-size: 22px; cursor: pointer; touch-action: manipulation; }
.ctrl-btn:active { background: #f0c040; color: #111; }
.ctrl-btn[aria-disabled="true"] { opacity: 0.3; pointer-events: none; }
.stop-btn { width: 100%; padding: 22px 16px; border-radius: 12px; border: 2px solid #444;
  background: #1a1a1a; color: #ccc; font-size: 22px; cursor: pointer; touch-action: manipulation; }
.stop-btn:active { background: #333; color: #fff; }
.video-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; }
.video-title { font-size: 16px; color: #ccc; text-align: center; padding: 8px 0 4px; }
</style>
</head>
<body>
<div id="conn-status">connecting\u2026</div>
<div id="ctx-label"></div>
<div id="ctx-title"></div>
<div id="actions"></div>

<script type="module">
import { MESSAGE_TYPES, createIntent, createSnapshotRequest, isStaleContext } from '../core/ws-protocol.js';

var WS_URL = 'ws://' + window.location.hostname + ':8766';
var MANIFEST_URL = 'http://' + window.location.hostname + ':8765/manifest.json';
var ws = null;
var currentVersion = -1;
var lastPingTime = Date.now();
var manifestCache = null;
var currentContextId = null;

var connStatus = document.getElementById('conn-status');
var ctxLabel = document.getElementById('ctx-label');
var ctxTitle = document.getElementById('ctx-title');
var actionsEl = document.getElementById('actions');

function titleCase(str) {
  return str.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
}

function sendIntent(intent, params) {
  [ws].filter(Boolean).forEach(function(s) {
    [s.readyState === WebSocket.OPEN].filter(Boolean).forEach(function() {
      s.send(JSON.stringify(createIntent(intent, params)));
    });
  });
}

var SKIP_LABEL_MAP = { '10': '10s', '30': '30s', '120': '2 min', '300': '5 min', '900': '15 min', '1800': '30 min' };
var VIDEO_TOGGLE   = { 'true': { send: 'pause', icon: '\u25b6' }, 'false': { send: 'play', icon: '\u23f8' } };
var FALLBACK_VIDEO_ACTIONS = [
  'skip_back_10','skip_back_30','skip_back_120','skip_back_300','skip_back_900','skip_back_1800',
  'skip_fwd_10','skip_fwd_30','skip_fwd_120','skip_fwd_300','skip_fwd_900','skip_fwd_1800'
];

function skipLabel(actionId) {
  var secs = actionId.split('_').pop();
  return SKIP_LABEL_MAP[secs] || secs + 's';
}

function renderActions(actions) {
  actionsEl.innerHTML = '';
  [actions.length === 0].filter(Boolean).forEach(function() {
    var p = document.createElement('div');
    p.className = 'no-actions';
    p.textContent = 'No actions available';
    actionsEl.appendChild(p);
  });
  actions.forEach(function(action) {
    var btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.textContent = action.label || titleCase(action.id);
    btn.addEventListener('click', function() { sendIntent(action.id); });
    actionsEl.appendChild(btn);
  });
}

function renderFallback(payload) {
  actionsEl.style.display = '';
  actionsEl.style.flexDirection = '';
  actionsEl.style.alignItems = '';
  renderActions(Array.isArray(payload.actions) ? payload.actions : []);
}

function renderBrowse() {
  actionsEl.innerHTML = '';
  actionsEl.style.display = 'flex';
  actionsEl.style.flexDirection = 'column';
  actionsEl.style.alignItems = 'center';
  var content = manifestCache ? manifestCache.content || [] : null;
  [!content].filter(Boolean).forEach(function() {
    var p = document.createElement('div');
    p.className = 'no-actions';
    p.textContent = 'Loading content\u2026';
    actionsEl.appendChild(p);
  });
  [content && content.length === 0].filter(Boolean).forEach(function() {
    var p = document.createElement('div');
    p.className = 'no-actions';
    p.textContent = 'No content available';
    actionsEl.appendChild(p);
  });
  var contentBasePath = (manifestCache.contentBase || '').replace(/^https?:\/\/[^\/]+/, '');
  [content || []].filter(function(c) { return c.length > 0; }).forEach(function(c) {
    c.forEach(function(film) {
      var btn = document.createElement('button');
      btn.className = 'tile-btn';
      var img = document.createElement('img');
      img.src = window.location.origin + contentBasePath + (film.poster || film.id + '.jpg');
      img.alt = film.title || film.id;
      btn.appendChild(img);
      var span = document.createElement('span');
      span.textContent = film.title || titleCase(film.id);
      btn.appendChild(span);
      btn.addEventListener('click', function() { sendIntent('select', { id: film.id }); });
      actionsEl.appendChild(btn);
    });
  });
}

function renderProfile(payload) {
  actionsEl.innerHTML = '';
  actionsEl.style.display = '';
  actionsEl.style.flexDirection = '';
  [['Kids', 'kids'], ['Adults', 'adults']].forEach(function(pair) {
    var btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.textContent = pair[0];
    btn.addEventListener('click', function() { sendIntent(pair[1]); });
    actionsEl.appendChild(btn);
  });
}

function renderDetail(payload) { renderFallback(payload); }
function renderError(payload)  { renderFallback(payload); }

function renderVideo(payload) {
  var display = payload.display || {};
  var id = display.id;
  var title = display.title || '';
  var received = [payload.actions].filter(Array.isArray).filter(function(a) { return a.length > 0; })[0];
  var actions = [received, FALLBACK_VIDEO_ACTIONS].filter(Boolean)[0];
  var playing = true;

  function showSkipOptions(prefix) {
    actionsEl.innerHTML = '';
    var filtered = actions.filter(function(a) { return a.indexOf(prefix) === 0; });
    var returnBtn = document.createElement('button');
    returnBtn.className = 'action-btn';
    returnBtn.textContent = '\u2190 Back';
    returnBtn.addEventListener('click', showMain);
    actionsEl.appendChild(returnBtn);
    filtered.forEach(function(actionId) {
      var btn = document.createElement('button');
      btn.className = 'action-btn';
      btn.textContent = skipLabel(actionId);
      btn.addEventListener('click', function() { sendIntent(actionId); showMain(); });
      actionsEl.appendChild(btn);
    });
  }

  function showMain() {
    actionsEl.innerHTML = '';
    actionsEl.style.display = 'flex';
    actionsEl.style.flexDirection = 'column';
    actionsEl.style.alignItems = '';

    [id].filter(Boolean).forEach(function(itemId) {
      var img = document.createElement('img');
      img.className = 'video-thumb';
      img.src = 'http://' + window.location.hostname + ':8080/' + itemId + '.jpg';
      img.alt = title;
      actionsEl.appendChild(img);
    });

    [title].filter(Boolean).forEach(function(t) {
      var div = document.createElement('div');
      div.className = 'video-title';
      div.textContent = t;
      actionsEl.appendChild(div);
    });

    var hasBack = actions.some(function(a) { return a.indexOf('skip_back_') === 0; });
    var hasFwd  = actions.some(function(a) { return a.indexOf('skip_fwd_')  === 0; });

    var ctrlRow = document.createElement('div');
    ctrlRow.className = 'ctrl-row';

    var btnSkipBack = document.createElement('button');
    btnSkipBack.className = 'ctrl-btn';
    btnSkipBack.textContent = '\u00ab';
    [!hasBack].filter(Boolean).forEach(function() { btnSkipBack.setAttribute('aria-disabled', 'true'); });
    [hasBack].filter(Boolean).forEach(function() {
      btnSkipBack.addEventListener('click', function() { showSkipOptions('skip_back_'); });
    });

    var toggleBtn = document.createElement('button');
    toggleBtn.className = 'ctrl-btn';
    toggleBtn.textContent = '\u23f8';
    toggleBtn.addEventListener('click', function() {
      var t = VIDEO_TOGGLE[playing + ''];
      sendIntent(t.send);
      playing = !playing;
      toggleBtn.textContent = t.icon;
    });

    var btnSkipFwd = document.createElement('button');
    btnSkipFwd.className = 'ctrl-btn';
    btnSkipFwd.textContent = '\u00bb';
    [!hasFwd].filter(Boolean).forEach(function() { btnSkipFwd.setAttribute('aria-disabled', 'true'); });
    [hasFwd].filter(Boolean).forEach(function() {
      btnSkipFwd.addEventListener('click', function() { showSkipOptions('skip_fwd_'); });
    });

    ctrlRow.appendChild(btnSkipBack);
    ctrlRow.appendChild(toggleBtn);
    ctrlRow.appendChild(btnSkipFwd);
    actionsEl.appendChild(ctrlRow);

    var backBtn = document.createElement('button');
    backBtn.className = 'action-btn';
    backBtn.textContent = '\u2190 Back';
    backBtn.addEventListener('click', function() { sendIntent('back'); });
    actionsEl.appendChild(backBtn);
  }

  showMain();
}

var SCREEN_RENDERERS = {
  profile: renderProfile,
  browse:  renderBrowse,
  detail:  renderDetail,
  video:   renderVideo,
  error:   renderError
};

function applyContext(payload) {
  currentVersion = payload.version;
  currentContextId = payload.context_id;
  var display = payload.display || {};
  ctxTitle.textContent = display.title || '';
  ctxLabel.textContent = payload.context_id ? titleCase(payload.context_id) : '';
  var renderer = SCREEN_RENDERERS[payload.context_id] || renderFallback;
  renderer(payload);
}

function handleMessage(msg) {
  var HANDLERS = {
    snapshot: function() {
      [msg.payload].filter(function(p) { return !isStaleContext(p, { version: currentVersion }); }).forEach(applyContext);
    },
    context: function() {
      [msg.payload].filter(function(p) { return !isStaleContext(p, { version: currentVersion }); }).forEach(applyContext);
    },
    ping: function() {
      lastPingTime = Date.now();
      ws.send(JSON.stringify({ type: MESSAGE_TYPES.PONG }));
    }
  };
  [HANDLERS[msg.type]].filter(Boolean).forEach(function(fn) { fn(); });
}

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = function() {
    connStatus.textContent = 'connected';
    ws.send(JSON.stringify(createSnapshotRequest()));
  };
  ws.onmessage = function(e) { handleMessage(JSON.parse(e.data)); };
  ws.onclose = function() {
    connStatus.textContent = 'reconnecting\u2026';
    setTimeout(connect, 2000);
  };
  ws.onerror = function() { connStatus.textContent = 'error'; };
}

setInterval(function() {
  [ws].filter(Boolean).forEach(function(s) {
    [Date.now() - lastPingTime > 20000].filter(Boolean).forEach(function() { s.close(); });
  });
}, 5000);

function loadManifest() {
  fetch(MANIFEST_URL)
    .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
    .then(function(data) {
      manifestCache = data;
      [currentContextId === 'browse'].filter(Boolean).forEach(renderBrowse);
    })
    .catch(function() {
      manifestCache = { content: [] };
      [currentContextId === 'browse'].filter(Boolean).forEach(renderBrowse);
    });
}

loadManifest();

connect();
</script>
</body>
</html>
