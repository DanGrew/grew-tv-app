<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>grew-tv</title>
<style>
:root {
  --bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 45%, #0f3460 100%);
  --surface: rgba(255,255,255,0.06);
  --surface-hi: rgba(255,255,255,0.11);
  --border: rgba(255,255,255,0.13);
  --focus: #fff;
  --text: rgba(255,255,255,0.95);
  --text-muted: rgba(255,255,255,0.4);
  --radius: 16px;
  --radius-sm: 8px;
  --dur: 0.18s;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); background-attachment: fixed; color: var(--text); font-family: var(--font); }
body { display: flex; flex-direction: column; padding: 16px; gap: 10px; }
#conn-status { font-size: 13px; font-family: monospace; color: var(--text-muted); text-align: center; height: 16px; flex-shrink: 0; }
#ctx-title { font-size: 20px; color: var(--text); text-align: center; flex-shrink: 0; min-height: 28px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#playlist-actions { display: flex; gap: 8px; flex-shrink: 0; }
.act-btn { flex: 1; padding: 12px 16px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 16px; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.act-btn:active, .act-btn:focus { outline: none; border-color: var(--focus); color: var(--focus); }
#btn-play.act-btn { border-color: var(--focus); color: var(--focus); }
#grid-wrap { flex: 1; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none; padding-top: 4px; }
#grid-wrap::-webkit-scrollbar { display: none; }
#txtgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.ph-txt { flex: 1; min-width: 0; background: none; border: none; border-radius: 0; padding: 0; font-size: 14px; min-height: 44px; display: flex; align-items: center; gap: 7px; color: var(--text); font-family: inherit; cursor: pointer; text-align: left; touch-action: manipulation; transition: color var(--dur) var(--ease); }
.ph-txt img { flex: 0 0 auto; width: 42px; height: 42px; object-fit: cover; border-radius: var(--radius-sm); background: var(--surface-hi); }
.ph-txt .nm { flex: 1; line-height: 1.2; }
.ph-txt .pct { font-size: 11px; color: var(--focus); }
.ph-txt:active, .ph-txt:focus { outline: none; color: var(--focus); }
.ph-row { grid-column: 1 / -1; display: flex; align-items: center; gap: 12px; padding: 10px 12px; border: 2px solid var(--border); border-radius: var(--radius); background: var(--surface); transition: border-color var(--dur) var(--ease); }
.ph-row:has(.ph-txt:active) { border-color: var(--focus); }
.ph-row:has(.ph-txt.prog) { border-color: var(--focus); }
.ph-edit { flex-shrink: 0; align-self: center; min-width: 46px; padding: 8px 12px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--surface-hi); color: var(--text); font-size: 18px; font-family: inherit; line-height: 1; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.ph-edit:active, .ph-edit:focus { outline: none; border-color: var(--focus); color: var(--focus); }
.ph-edit.x { border-color: rgba(255,135,135,0.5); color: #ff8787; }
.ph-edit.x:active, .ph-edit.x:focus { outline: none; border-color: #ff8787; }
.no-actions { color: var(--text-muted); font-size: 16px; text-align: center; margin-top: 40px; grid-column: 1 / -1; }
#manage-actions { display: flex; gap: 10px; justify-content: center; margin-top: 4px; flex-shrink: 0; }
#btn-rename-playlist { padding: 10px 18px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 15px; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
#btn-rename-playlist:active, #btn-rename-playlist:focus { outline: none; border-color: var(--focus); color: var(--focus); }
#btn-delete-playlist { padding: 10px 18px; border: 2px solid rgba(255,135,135,0.5); border-radius: var(--radius-sm); background: var(--surface); color: #ff8787; font-size: 15px; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease); }
#btn-delete-playlist:active, #btn-delete-playlist:focus { outline: none; border-color: #ff8787; }
#btn-add-all { padding: 10px 18px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 15px; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
#btn-add-all:active, #btn-add-all:focus { outline: none; border-color: var(--focus); color: var(--focus); }
#add-sheet { display: none; position: fixed; inset: 0; z-index: 10; align-items: center; justify-content: center; background: rgba(0,0,0,0.62); }
.add-sheet-panel { background: #16213e; border: 2px solid var(--border); border-radius: var(--radius); padding: 22px; margin: 24px; width: 100%; max-width: 360px; max-height: 76vh; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 18px 50px rgba(0,0,0,0.55); }
.add-sheet-title { font-size: 18px; text-align: center; }
#add-sheet-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
.add-choice { padding: 12px 14px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 16px; font-family: inherit; text-align: left; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.add-choice:active, .add-choice:focus { outline: none; border-color: var(--focus); color: var(--focus); }
.add-queue { padding: 12px 14px; border: 2px solid var(--focus); border-radius: var(--radius-sm); background: var(--surface-hi); color: var(--text); font-size: 16px; font-family: inherit; text-align: left; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.add-queue:active, .add-queue:focus { outline: none; border-color: var(--focus); color: var(--focus); }
.add-sheet-act { padding: 12px 14px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 16px; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.add-sheet-act:active, .add-sheet-act:focus { outline: none; border-color: var(--focus); color: var(--focus); }
#btn-add-create { border-color: #7ee787; color: #7ee787; }
#add-status { display: none; position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%); z-index: 11; padding: 12px 22px; background: #1f2d50; border: 2px solid var(--border); border-radius: var(--radius); font-size: 15px; box-shadow: 0 12px 36px rgba(0,0,0,0.5); }
#confirm-delete { display: none; position: fixed; inset: 0; z-index: 10; align-items: center; justify-content: center; background: rgba(0,0,0,0.62); }
#confirm-box { background: var(--surface-hi); border: 2px solid var(--border); border-radius: var(--radius); padding: 24px 26px; margin: 24px; max-width: 360px; text-align: center; }
#confirm-title { font-size: 18px; margin-bottom: 8px; }
#confirm-delete-name { font-size: 15px; color: var(--text-muted); margin-bottom: 22px; }
#confirm-actions { display: flex; gap: 12px; justify-content: center; }
#confirm-actions button { padding: 12px 18px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 16px; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
#confirm-actions button:active, #confirm-actions button:focus { outline: none; border-color: var(--focus); color: var(--focus); }
#btn-confirm-delete { border-color: rgba(255,135,135,0.5); color: #ff8787; }
#breadcrumb { flex-shrink: 0; }
.breadcrumb { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
.crumb { font-size: 13px; }
.crumb-current { color: var(--text-muted); }
.crumb-sep { color: var(--text-muted); font-size: 13px; }
.crumb-link { background: none; border: none; padding: 2px 4px; margin: 0; color: var(--text); font-size: 13px; font-family: inherit; cursor: pointer; border-radius: var(--radius-sm); touch-action: manipulation; transition: color var(--dur) var(--ease); }
.crumb-link:active { color: var(--focus); }
.crumb-link:focus { outline: 1px solid var(--focus); }
#screen-bar { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; flex-shrink: 0; }
#screen-bar:empty { display: none; }
.screen-bar-label { width: 100%; font-size: 12px; color: var(--text-muted); text-align: center; text-transform: uppercase; letter-spacing: 1px; }
.screen-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; width: 100%; }
.screen-current { padding: 8px 14px; border: 2px solid var(--border); border-radius: 999px; background: var(--surface); color: var(--text); font-size: 14px; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.screen-current:active, .screen-current:focus { outline: none; border-color: var(--focus); color: var(--focus); }
.screen-btn { padding: 10px 16px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 15px; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.screen-btn:active, .screen-btn:focus { outline: none; border-color: var(--focus); color: var(--focus); }
.screen-btn.on { border-color: var(--focus); color: var(--focus); }
.screen-swatch { width: 14px; height: 14px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.55); flex-shrink: 0; }
.screen-btn, .screen-current { display: inline-flex; align-items: center; gap: 8px; }
#sync-bar { display: flex; align-items: center; justify-content: flex-end; gap: 10px; flex-shrink: 0; padding: 2px; }
.seg { display: inline-flex; flex: 0 0 auto; border: 2px solid var(--border); border-radius: 999px; overflow: hidden; }
.seg-opt { font-size: 14px; padding: 8px 16px; border: none; background: transparent; color: var(--text-muted); font-family: inherit; cursor: pointer; touch-action: manipulation; transition: background var(--dur) var(--ease), color var(--dur) var(--ease); }
.seg-opt.on { background: var(--surface-hi); color: var(--focus); }
.seg-opt:active { color: var(--focus); }
.seg-opt:focus { outline: 2px solid var(--focus); outline-offset: -2px; }
.browsing #btn-play, .browsing #btn-shuffle, .browsing .ph-txt { opacity: 0.35; pointer-events: none; }
</style>
</head>
<body>
<div id="conn-status">connecting…</div>
<div id="screen-bar"></div>
<div id="sync-bar"></div>
<div id="breadcrumb"></div>
<div id="ctx-title"></div>
<div id="playlist-actions">
  <button id="btn-play" class="act-btn" type="button">&#9654; Play</button>
  <button id="btn-shuffle" class="act-btn" type="button">&#128256; Shuffle</button>
</div>
<div id="grid-wrap"><div id="txtgrid"></div></div>
<div id="manage-actions">
  <button id="btn-add-all" type="button">&#65291; Add all to playlist</button>
  <button id="btn-rename-playlist" type="button">&#9998; Rename</button>
  <button id="btn-delete-playlist" type="button">&#128465; Delete playlist</button>
</div>
<div id="confirm-delete">
  <div id="confirm-box">
    <div id="confirm-title">Delete this playlist?</div>
    <div id="confirm-delete-name"></div>
    <div id="confirm-actions">
      <button id="btn-confirm-delete" type="button">Delete</button>
      <button id="btn-cancel-delete" type="button">Cancel</button>
    </div>
  </div>
</div>
<div id="add-sheet">
  <div class="add-sheet-panel">
    <div class="add-sheet-title">Add to playlist</div>
    <div id="add-sheet-list"></div>
    <button id="btn-add-create" class="add-sheet-act" type="button">&#65291; New playlist</button>
    <button id="btn-add-cancel" class="add-sheet-act" type="button">Cancel</button>
  </div>
</div>
<div id="add-status"></div>
<script type="module">
import { initPage } from '../ui/screens/companion-playlist.js';
initPage();
</script>
</body>
</html>
