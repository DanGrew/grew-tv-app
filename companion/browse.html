<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>grew-tv</title>
<style>
:root {
  --bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 45%, #0f3460 100%);
  --surface: rgba(255,255,255,0.06);
  --surface-hi: rgba(255,255,255,0.11);
  --border: rgba(255,255,255,0.13);
  --focus: #fff;
  --focus-glow: 0 0 0 1px rgba(255,255,255,0.6), 0 4px 24px rgba(255,255,255,0.15);
  --text: rgba(255,255,255,0.95);
  --text-muted: rgba(255,255,255,0.4);
  --radius: 16px;
  --radius-sm: 8px;
  --dur: 0.18s;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); background-attachment: fixed; color: var(--text); font-family: var(--font); }
body { display: flex; flex-direction: column; padding: 12px; gap: 10px; }
#conn-status { font-size: 13px; font-family: monospace; color: var(--text-muted); text-align: center; height: 16px; flex-shrink: 0; }
#drill { flex: 1; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none; display: flex; flex-direction: column; gap: 14px; }
#drill::-webkit-scrollbar, .chip-row::-webkit-scrollbar, #txtgrid::-webkit-scrollbar { display: none; }
.ph-section { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; }
.chip-row { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; padding-bottom: 2px; flex-shrink: 0; }
.chip { white-space: nowrap; background: var(--surface-hi); border: 2px solid var(--border); border-radius: 999px; padding: 9px 15px; font-size: 14px; color: var(--text-muted); font-family: inherit; cursor: pointer; touch-action: manipulation; transition: color var(--dur) var(--ease), border-color var(--dur) var(--ease); }
.chip.active { color: var(--focus); border-color: var(--focus); box-shadow: var(--focus-glow); }
.chip.dim { opacity: 0.5; }
.chip:active, .chip:focus { outline: none; color: var(--focus); border-color: var(--focus); }
#rails-wrap, #grid-wrap { display: flex; flex-direction: column; gap: 8px; }
#grid-count { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
#txtgrid { display: grid; grid-template-columns: 1fr; gap: 7px; }
.ph-txt { background: var(--surface-hi); border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 12px 11px; font-size: 14px; min-height: 48px; display: flex; align-items: center; gap: 7px; color: var(--text); font-family: inherit; cursor: pointer; text-align: left; touch-action: manipulation; transition: border-color var(--dur) var(--ease); }
.ph-txt .nm { flex: 1; line-height: 1.2; }
.ph-txt .pct { font-size: 11px; color: var(--focus); }
.ph-txt.prog { border-color: var(--focus); }
.ph-txt:active, .ph-txt:focus { outline: none; border-color: var(--focus); }
.ph-txt-cell { display: flex; gap: 8px; align-items: center; padding: 6px 8px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); transition: border-color var(--dur) var(--ease); }
.ph-txt-cell:has(.ph-txt:active), .ph-txt-cell:has(.ph-txt:focus) { border-color: var(--focus); }
.ph-txt-cell .ph-txt { flex: 1; min-width: 0; min-height: 0; border: none; background: none; border-radius: 0; padding: 6px 4px; }
.ph-cell-queue { flex: 0 0 auto; align-self: center; padding: 6px 14px; background: var(--surface-hi); border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 20px; color: var(--text); font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.ph-cell-queue:active, .ph-cell-queue:focus { outline: none; border-color: var(--focus); color: var(--focus); }
#queue-status { display: none; position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%); z-index: 11; padding: 12px 22px; background: #1f2d50; border: 2px solid var(--border); border-radius: var(--radius); font-size: 15px; box-shadow: 0 12px 36px rgba(0,0,0,0.5); }
#btn-back { align-self: flex-start; flex-shrink: 0; font-size: 14px; padding: 9px 16px; border-radius: 999px; border: 2px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
#btn-back:active, #btn-back:focus { outline: none; border-color: var(--focus); color: var(--focus); }
#topbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-shrink: 0; }
#switch-profile { flex: 0 0 auto; font-size: 13px; padding: 8px 14px; border-radius: 999px; border: 2px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
#switch-profile:active, #switch-profile:focus { outline: none; border-color: var(--focus); color: var(--focus); }
.chip-create { font-weight: 700; padding-left: 17px; padding-right: 17px; }
#queue-actions { display: flex; gap: 10px; flex-shrink: 0; }
#btn-play-queue, #btn-play-queue-music { flex: 1 1 0; min-width: 0; font-size: 15px; padding: 12px 16px; border-radius: var(--radius-sm); border: 2px solid var(--focus); background: var(--surface-hi); color: var(--focus); font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
#btn-play-queue:active, #btn-play-queue:focus, #btn-play-queue-music:active, #btn-play-queue-music:focus { outline: none; border-color: var(--focus); color: var(--focus); }
#breadcrumb { flex-shrink: 0; }
.breadcrumb { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
.crumb { font-size: 13px; }
.crumb-current { color: var(--text-muted); }
.crumb-sep { color: var(--text-muted); font-size: 13px; }
.crumb-link { background: none; border: none; padding: 2px 4px; margin: 0; color: var(--text); font-size: 13px; font-family: inherit; cursor: pointer; border-radius: var(--radius-sm); touch-action: manipulation; transition: color var(--dur) var(--ease); }
.crumb-link:active { color: var(--focus); }
.crumb-link:focus { outline: 1px solid var(--focus); }
#screen-bar { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; flex-shrink: 0; }
#screen-bar:empty { display: none; }
.screen-bar-label { width: 100%; font-size: 12px; color: var(--text-muted); text-align: center; text-transform: uppercase; letter-spacing: 1px; }
.screen-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; width: 100%; }
.screen-current { padding: 8px 14px; border: 2px solid var(--border); border-radius: 999px; background: var(--surface); color: var(--text); font-size: 14px; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.screen-current:active, .screen-current:focus { outline: none; border-color: var(--focus); color: var(--focus); }
.screen-btn { padding: 10px 16px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 15px; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.screen-btn:active, .screen-btn:focus { outline: none; border-color: var(--focus); color: var(--focus); }
.screen-btn.on { border-color: var(--focus); color: var(--focus); }
.screen-swatch { width: 14px; height: 14px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.55); flex-shrink: 0; }
.screen-btn, .screen-current { display: inline-flex; align-items: center; gap: 8px; }
#sync-bar { display: flex; align-items: center; justify-content: flex-end; gap: 10px; flex-shrink: 0; padding: 2px; }
.seg { display: inline-flex; flex: 0 0 auto; border: 2px solid var(--border); border-radius: 999px; overflow: hidden; }
.seg-opt { font-size: 14px; padding: 8px 16px; border: none; background: transparent; color: var(--text-muted); font-family: inherit; cursor: pointer; touch-action: manipulation; transition: background var(--dur) var(--ease), color var(--dur) var(--ease); }
.seg-opt.on { background: var(--surface-hi); color: var(--focus); }
.seg-opt:active { color: var(--focus); }
.seg-opt:focus { outline: 2px solid var(--focus); outline-offset: -2px; }
.desync-off { opacity: 0.35; pointer-events: none; }
</style>
</head>
<body>
<div id="conn-status">connecting…</div>
<div id="screen-bar"></div>
<div id="sync-bar"></div>
<div id="queue-actions">
<button id="btn-play-queue" type="button" style="display:none">&#127909; (0)</button>
<button id="btn-play-queue-music" type="button" style="display:none">&#127925; (0)</button>
</div>
<div id="topbar">
  <div id="breadcrumb"></div>
  <button id="switch-profile" type="button">👤 Switch profile</button>
</div>
<div id="drill">
  <div class="ph-section">Sections</div>
  <div id="sections-row" class="chip-row"></div>
  <div id="rails-wrap">
    <div class="ph-section">Rails</div>
    <div id="rails-row" class="chip-row"></div>
  </div>
  <div id="grid-wrap">
    <div id="grid-count"></div>
    <div id="txtgrid"></div>
  </div>
  <button id="btn-back" type="button">‹ Back</button>
</div>
<div id="queue-status"></div>
<script type="module">
import { initPage } from '../ui/screens/companion-browse.js';
initPage();
</script>
</body>
</html>
