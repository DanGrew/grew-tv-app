<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>grew-tv</title>
<style>
:root {
  --bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 45%, #0f3460 100%);
  --surface: rgba(255,255,255,0.06);
  --surface-hi: rgba(255,255,255,0.11);
  --border: rgba(255,255,255,0.13);
  --focus: #fff;
  --text: rgba(255,255,255,0.95);
  --text-muted: rgba(255,255,255,0.4);
  --radius: 16px;
  --radius-sm: 8px;
  --dur: 0.18s;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); background-attachment: fixed; color: var(--text); font-family: var(--font); }
body { display: flex; flex-direction: column; padding: 12px; gap: 10px; }
#conn-status { font-size: 13px; font-family: monospace; color: var(--text-muted); text-align: center; height: 16px; flex-shrink: 0; }
#search { width: 100%; flex-shrink: 0; font-size: 17px; padding: 12px 14px; border-radius: 8px; border: none; border-bottom: 2px solid var(--border); background: rgba(255,255,255,0.05); color: var(--text); }
#search:focus { outline: none; border-bottom-color: var(--focus); }
#scroll { flex: 1; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none; display: flex; flex-direction: column; gap: 16px; }
#scroll::-webkit-scrollbar, #tabs::-webkit-scrollbar, .c-rail-row::-webkit-scrollbar { display: none; }
.section-title { font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
#tabs { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; flex-shrink: 0; border-bottom: 1px solid var(--border); }
.c-tab { flex: 0 0 auto; font-size: 15px; padding: 14px 16px 12px; border: none; border-bottom: 2px solid transparent; background: none; color: var(--text-muted); font-family: inherit; cursor: pointer; touch-action: manipulation; transition: color var(--dur) var(--ease), border-color var(--dur) var(--ease); }
.c-tab.active { color: var(--focus); border-bottom-color: var(--focus); }
#rails-section { display: flex; flex-direction: column; gap: 16px; }
.c-rail { display: flex; flex-direction: column; gap: 8px; }
.c-rail-row { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; padding-bottom: 4px; }
.c-rail-row .tile-btn { width: 130px; flex-shrink: 0; }
#search-section { display: none; }
#grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
#empty { display: none; color: var(--text-muted); font-size: 16px; text-align: center; padding: 40px 0; }
.tile-btn { display: flex; flex-direction: column; background: var(--surface); border: 2px solid transparent; border-radius: 4px; overflow: hidden; cursor: pointer; padding: 0; color: var(--text); width: 100%; touch-action: manipulation; transition: border-color var(--dur) var(--ease); }
.tile-btn img { width: 100%; height: 120px; object-fit: contain; background: #000; flex-shrink: 0; }
.tile-btn span { color: var(--text); font-size: 14px; padding: 8px; text-align: left; }
.tile-btn:active { border-color: var(--focus); }
#breadcrumb { flex-shrink: 0; }
.breadcrumb { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
.crumb { font-size: 13px; }
.crumb-current { color: var(--text-muted); }
.crumb-sep { color: var(--text-muted); font-size: 13px; }
.crumb-link { background: none; border: none; padding: 2px 4px; margin: 0; color: var(--text); font-size: 13px; font-family: inherit; cursor: pointer; border-radius: var(--radius-sm); touch-action: manipulation; transition: color var(--dur) var(--ease); }
.crumb-link:active { color: var(--focus); }
.crumb-link:focus { outline: 1px solid var(--focus); }
#topbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-shrink: 0; }
#switch-profile { flex: 0 0 auto; font-size: 13px; padding: 8px 14px; border-radius: 999px; border: 2px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
#switch-profile:active { border-color: var(--focus); color: var(--focus); }
#switch-profile:focus { outline: none; border-color: var(--focus); color: var(--focus); }
#screen-bar { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; flex-shrink: 0; }
#screen-bar:empty { display: none; }
.screen-bar-label { width: 100%; font-size: 12px; color: var(--text-muted); text-align: center; text-transform: uppercase; letter-spacing: 1px; }
.screen-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; width: 100%; }
.screen-current { padding: 8px 14px; border: 2px solid var(--border); border-radius: 999px; background: var(--surface); color: var(--text); font-size: 14px; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.screen-current:active, .screen-current:focus { outline: none; border-color: var(--focus); color: var(--focus); }
.screen-btn { padding: 10px 16px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 15px; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.screen-btn:active, .screen-btn:focus { outline: none; border-color: var(--focus); color: var(--focus); }
.screen-btn.on { border-color: var(--focus); color: var(--focus); }
</style>
</head>
<body>
<div id="conn-status">connecting…</div>
<div id="screen-bar"></div>
<div id="topbar">
  <div id="breadcrumb"></div>
  <button id="switch-profile" type="button">👤 Switch profile</button>
</div>
<input id="search" type="search" placeholder="Search titles…" autocomplete="off">
<div id="tabs"></div>
<div id="scroll">
  <div id="rails-section"><div id="rails"></div></div>
  <div id="search-section">
    <div class="section-title">Results</div>
    <div id="grid"></div>
    <div id="empty">No matches</div>
  </div>
</div>
<script type="module">
import { initPage } from '../ui/screens/companion-browse.js';
initPage();
</script>
</body>
</html>
