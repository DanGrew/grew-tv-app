<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>grew-tv</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #111; color: #fff; font-family: sans-serif; }
body { display: flex; flex-direction: column; padding: 12px; gap: 10px; }
#conn-status { font-size: 13px; font-family: monospace; color: #555; text-align: center; height: 16px; flex-shrink: 0; }
#search { width: 100%; flex-shrink: 0; font-size: 17px; padding: 12px 14px; border-radius: 12px; border: 2px solid #2a2a2a; background: #1a1a1a; color: #fff; }
#search:focus { outline: none; border-color: #f0c040; }
#scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
.section-title { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
#cw-section { display: none; }
#cw { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; }
#cw .tile-btn { width: 130px; flex-shrink: 0; }
#grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
#empty { display: none; color: #555; font-size: 16px; text-align: center; padding: 40px 0; }
.tile-btn { display: flex; flex-direction: column; background: #1a1a1a; border: none; border-radius: 8px; overflow: hidden; cursor: pointer; padding: 0; color: #fff; width: 100%; touch-action: manipulation; }
.tile-btn img { width: 100%; height: 120px; object-fit: cover; background: #222; flex-shrink: 0; }
.tile-btn span { color: #fff; font-size: 14px; padding: 8px; text-align: left; }
.tile-btn:active { opacity: 0.7; }
</style>
</head>
<body>
<div id="conn-status">connecting…</div>
<input id="search" type="search" placeholder="Search titles…" autocomplete="off">
<div id="scroll">
  <div id="cw-section">
    <div class="section-title">Continue Watching</div>
    <div id="cw"></div>
  </div>
  <div>
    <div class="section-title">All</div>
    <div id="grid"></div>
    <div id="empty">No matches</div>
  </div>
</div>
<script type="module">
import { initPage } from '../ui/screens/companion-browse.js';
initPage();
</script>
</body>
</html>
