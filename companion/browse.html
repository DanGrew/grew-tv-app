<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>grew-tv</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #111; color: #fff; font-family: sans-serif; }
body { display: flex; flex-direction: column; padding: 16px; gap: 10px; }
#conn-status { font-size: 13px; font-family: monospace; color: #555; text-align: center; height: 16px; flex-shrink: 0; }
#ctx-label { font-size: 12px; color: #444; text-align: center; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; min-height: 16px; }
#ctx-title { font-size: 20px; color: #ccc; text-align: center; flex-shrink: 0; min-height: 28px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#actions { flex: 1; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-top: 4px; }
.back-btn { align-self: flex-start; padding: 10px 16px; border-radius: 10px; border: none; background: #2a2a2a; color: #fff; font-size: 16px; cursor: pointer; flex-shrink: 0; touch-action: manipulation; }
.back-btn:active { background: #f0c040; color: #111; }
.no-actions { color: #333; font-size: 16px; text-align: center; margin-top: 40px; }
.tile-btn { display: flex; flex-direction: column; background: #1a1a1a; border: none; border-radius: 8px; overflow: hidden; cursor: pointer; padding: 0; color: #fff; width: 100%; max-width: 2in; flex-shrink: 0; }
.tile-btn img { width: 100%; height: 100px; object-fit: cover; flex-shrink: 0; }
.tile-btn span { color: #fff; font-size: 14px; padding: 6px 8px; text-align: left; flex-shrink: 0; }
.tile-btn:active { opacity: 0.7; }
</style>
</head>
<body>
<div id="conn-status">connecting\u2026</div>
<div id="ctx-label"></div>
<div id="ctx-title"></div>
<button id="btn-back" class="back-btn">← Back</button>
<div id="actions"></div>
<script type="module">
import { initPage } from '../ui/screens/companion-browse.js';
initPage();
</script>
</body>
</html>
