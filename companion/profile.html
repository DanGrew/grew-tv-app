<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>grew-tv</title>
<style>
:root {
  --bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 45%, #0f3460 100%);
  --surface: rgba(255,255,255,0.06);
  --surface-hi: rgba(255,255,255,0.11);
  --border: rgba(255,255,255,0.13);
  --focus: #fff;
  --text: rgba(255,255,255,0.95);
  --text-muted: rgba(255,255,255,0.4);
  --radius: 16px;
  --radius-sm: 8px;
  --dur: 0.18s;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); background-attachment: fixed; color: var(--text); font-family: var(--font); }
body { display: flex; flex-direction: column; padding: 16px; gap: 10px; }
#conn-status { font-size: 13px; font-family: monospace; color: var(--text-muted); text-align: center; height: 16px; flex-shrink: 0; }
#ctx-label { font-size: 12px; color: var(--text-muted); text-align: center; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; min-height: 16px; }
#ctx-title { font-size: 20px; color: var(--text); text-align: center; flex-shrink: 0; min-height: 28px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#actions { flex: 1; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-top: 4px; }
.action-btn { width: 100%; padding: 22px 16px; border-radius: var(--radius); border: 2px solid var(--border); background: var(--surface); color: var(--text); font-size: 22px; cursor: pointer; touch-action: manipulation; transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease), color var(--dur) var(--ease), transform 0.08s; }
.action-btn:active { background: var(--surface-hi); border-color: var(--focus); color: var(--focus); transform: scale(0.97); }
.cmp-cards { display: flex; gap: 12px; }
.cmp-card { position: relative; flex: 1; padding: 0; border: 2px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); overflow: hidden; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease); }
.cmp-card:active { border-color: var(--focus); }
.cmp-lock { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; font-size: 14px; z-index: 2; }
.cmp-photo { height: 110px; display: flex; align-items: center; justify-content: center; }
.cmp-photo.kids { background: linear-gradient(160deg, #3a7bd5, #00d2ff); }
.cmp-photo.adults { background: linear-gradient(160deg, #834d9b, #d04ed6); }
.cmp-photo-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.cmp-photo-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 44px; }
.cmp-name { padding: 10px; font-size: 16px; text-align: center; }
.cmp-keypad-wrap { display: none; flex-direction: column; align-items: center; gap: 14px; margin-top: 16px; }
.cmp-keypad-wrap.active { display: flex; }
.cmp-keypad-wrap.shake { animation: shake 0.4s; }
.cmp-keypad-title { font-size: 14px; color: var(--text-muted); }
.cmp-dots { display: flex; gap: 14px; }
.cmp-dots span { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--text-muted); }
.cmp-dots span.on { background: var(--focus); border-color: var(--focus); }
.cmp-keypad { display: grid; grid-template-columns: repeat(3, 64px); gap: 10px; }
.cmp-key { width: 64px; height: 64px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--surface-hi); color: var(--text); font-size: 24px; cursor: pointer; touch-action: manipulation; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
.cmp-key:active { background: var(--surface-hi); border-color: var(--focus); color: var(--focus); }
@keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }
</style>
</head>
<body>
<div id="conn-status">connecting\u2026</div>
<div id="ctx-label"></div>
<div id="ctx-title"></div>
<div id="actions"></div>
<script type="module">
import { initPage } from '../ui/screens/companion-profile.js';
initPage();
</script>
</body>
</html>
