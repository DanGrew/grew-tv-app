# TASK-329 — the standing "ruthless" e2e flake hunt.
#
# The normal `Tests / e2e-test` job answers "does the suite pass?". This one answers
# a stricter question: "is every test DETERMINISTICALLY green under parallel load?".
# It runs the whole suite three times over with retries OFF, so a test that only
# passes on a retry — the BUG-019 settle-signal family this repo keeps re-growing —
# fails here and is NAMED on the PR instead of being silently masked.
#
# Design decisions (owner, 2026-07-12):
# - `pull_request` ONLY. No push-to-main run, no nightly/scheduled job: the PR check
#   is the surface, so you see the flake where you already are.
# - The whole suite by DISCOVERY (playwright's own `tests/*.test.js` testDir glob) —
#   never a curated subset, never a quarantine allowlist to rot (WAYS: gates are
#   opt-out, not opt-in). A genuinely unrunnable test is excused per-test with a
#   one-line reason + a tracking follow-up, in the test file itself.
# - `--repeat-each=3 --retries=0`. Retries are exactly what we're trying to defeat
#   here; the normal e2e job KEEPS its retry behaviour for developer signal.
# - Sharded 4 ways to bound wall-clock (3x the suite is ~1.5k cases) while still
#   running under the normal parallel worker pool — the load condition IS the repro.
# - ADVISORY / NON-BLOCKING, like every Grew check: nothing here is a required
#   status check, the owner merges regardless. It lands red and is swept via
#   follow-up tasks — never gold-plated to green. It is deliberately NOT wired into
#   the `pr-report` job's `needs`, so it can never gate that comment.
name: Flake hunt

on:
  pull_request:
    branches: [main]

jobs:
  flake-hunt:
    name: flake-hunt (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-
      - run: npx playwright install chromium --with-deps
      - name: Hunt flakes (full suite x3, no retries)
        run: npx playwright test --shard=${{ matrix.shard }}/4 --repeat-each=3 --retries=0
