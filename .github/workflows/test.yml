  pr-report:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    needs:
      - coverage
      - check-untested
      - no-dom-in-core
      - no-ui-imports
      - no-stray-files
      - no-app-exports
      - no-guard-chain
      - no-filter-conditional
      - no-json-in-repo
      - app-index-only
      - no-media-outside-assets
      - no-css-outside-styles
      - no-md-outside-docs
      - no-pure-fn-outside-core
      - no-fetch-in-app
      - no-storage-in-app
      - no-ws-in-app
      - max-inline-script-lines
      - no-multi-screen-html
      - companion-in-layers
      - no-logic-in-inline-callbacks
      - ui-cyclomatic
      - tv-focus-rings
      - tv-min-font-size
      - tv-no-blank-screen
      - e2e-test
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          pattern: report-*
          path: reports
          merge-multiple: true

      - name: Combine reports
        run: |
          smry() { grep '^SUMMARY:' "$1" 2>/dev/null | sed 's/^SUMMARY: //' || echo "❌ missing"; }
          row() { echo "| $1 | $2 |"; }
          {
            echo "<!-- ci-report -->"
            echo "**CI Report** · \`${GITHUB_SHA:0:7}\` · $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            COV=$(grep '| Lines' reports/coverage-report.md 2>/dev/null | grep -oP '\d+\.?\d*%' | head -1 || echo "❌ missing")
            row "Coverage (lines)" "$COV"
            row "check-untested" "$(smry reports/untested-report.txt)"
            row "no-dom-in-core" "$(smry reports/no-dom.txt)"
            row "no-ui-imports" "$(smry reports/no-ui-imports.txt)"
            row "no-stray-files" "$(smry reports/no-stray-files.txt)"
            row "no-app-exports" "$(smry reports/no-app-exports.txt)"
            row "no-guard-chain" "$(smry reports/no-guard-chain.txt)"
            row "no-filter-conditional" "$(smry reports/no-filter-conditional.txt)"
            row "no-json-in-repo" "$(smry reports/no-json-in-repo.txt)"
            row "app-index-only" "$(smry reports/app-index-only.txt)"
            row "no-media-outside-assets" "$(smry reports/no-media-outside-assets.txt)"
            row "no-css-outside-styles" "$(smry reports/no-css-outside-styles.txt)"
            row "no-md-outside-docs" "$(smry reports/no-md-outside-docs.txt)"
            row "no-pure-fn-outside-core" "$(smry reports/no-pure-fn-outside-core.txt)"
            row "no-fetch-in-app" "$(smry reports/no-fetch-in-app.txt)"
            row "no-storage-in-app" "$(smry reports/no-storage-in-app.txt)"
            row "no-ws-in-app" "$(smry reports/no-ws-in-app.txt)"
            row "max-inline-script-lines" "$(smry reports/max-inline-script-lines.txt)"
            row "no-multi-screen-html" "$(smry reports/no-multi-screen-html.txt)"
            row "companion-in-layers" "$(smry reports/companion-in-layers.txt)"
            row "no-logic-in-inline-callbacks" "$(smry reports/no-logic-in-inline-callbacks.txt)"
            row "ui-cyclomatic" "$(smry reports/ui-cyclomatic.txt)"
            row "tv-focus-rings" "$(smry reports/tv-focus-rings.txt)"
            row "tv-min-font-size" "$(smry reports/tv-min-font-size.txt)"
            row "tv-no-blank-screen" "$(smry reports/tv-no-blank-screen.txt)"
            E2E=$(cat reports/e2e-report.txt 2>/dev/null || echo "❌ missing")
            row "e2e" "$E2E"
          } > combined.md

      - name: Find existing CI report comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- ci-report -->'

      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: combined.md
          edit-mode: replace
