name: Mutation

# core/ pure-logic mutation gate (TASK-305 / SYS-016). Stryker mutates core/**
# and reruns the unit suite against each mutant, so it is inherently slow. It is
# advisory (Grew PR checks don't block a merge) and mirrors the backend gate
# (media-manager mutation.yml): it runs on **merge to main only** — never delaying
# a PR — and only when core/ (or the mutation config) actually changed.
#
# The score lands on main, where nobody watching PRs sees it. So the run also
# NOTIFIES: on failure it opens (or refreshes) a single GitHub issue labelled
# `mutation-gate` — a distinctive, filterable "it failed, raise a survivor task"
# ping — and closes it again when the gate goes green. Dedup by the label means at
# most one open issue at a time (no pile-up). See docs/mutation-testing.md.
on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "stryker.conf.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/mutation.yml"

permissions:
  contents: read
  issues: write

jobs:
  mutation:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_LABEL: mutation-gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - id: gate
        run: npm run test:mutation | tee "$RUNNER_TEMP/mutation.log"

      # Gate PASSED (every prior step ok) → close any standing survivor issue.
      - name: Close resolved survivor issue
        if: success()
        run: |
          gh label create "$ISSUE_LABEL" --color B60205 --description "Mutation gate survivor backlog" 2>/dev/null || true
          gh issue list --label "$ISSUE_LABEL" --state open --json number --jq '.[].number' \
            | while read -r n; do
                gh issue close "$n" \
                  --comment "✅ core/ mutation gate green again on \`${GITHUB_SHA}\` — survivors cleared, closing."
              done

      # Gate FAILED → open one issue, or comment on the standing one (never a dupe).
      - name: Open or refresh survivor issue
        if: ${{ failure() && steps.gate.outcome == 'failure' }}
        run: |
          gh label create "$ISSUE_LABEL" --color B60205 --description "Mutation gate survivor backlog" 2>/dev/null || true
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          existing="$(gh issue list --label "$ISSUE_LABEL" --state open --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" \
              --body "🔴 Failed again on \`${GITHUB_SHA}\` — [run]($RUN_URL)."
            exit 0
          fi
          {
            echo "The **core/ mutation gate** (Stryker) failed on \`main\` (\`${GITHUB_SHA}\`)."
            echo
            echo "A change merged that a mutant survived — a behaviour no unit test catches."
            echo "**Raise a survivor-sweep task** and clear it. This issue re-comments if it keeps"
            echo "failing and closes itself once the gate is green again."
            echo
            echo "- Run: $RUN_URL"
            echo
            echo "<details><summary>gate output (tail)</summary>"
            echo
            echo '```'
            tail -n 40 "$RUNNER_TEMP/mutation.log"
            echo '```'
            echo
            echo "</details>"
          } > "$RUNNER_TEMP/issue-body.md"
          gh issue create --label "$ISSUE_LABEL" \
            --title "🔴 core/ mutation gate failed on main — raise a survivor task" \
            --body-file "$RUNNER_TEMP/issue-body.md"
